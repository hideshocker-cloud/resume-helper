<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIPEI · 智能求职助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Word 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .tab-active {
            border-bottom-width: 2px;
            border-color: #4f46e5;
            color: #4f46e5;
        }
        .tab-inactive {
            border-bottom-width: 2px;
            border-color: transparent;
            color: #6b7280;
        }
        .tab-inactive:hover {
            color: #1f2937;
        }
        .custom-list {
            list-style-type: disc;
            padding-left: 1.25rem;
        }
        .custom-list li {
            margin-bottom: 0.25rem;
            white-space: normal;
            word-break: break-word;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            background: white;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        .question-item {
            margin-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 16px;
        }
        .option-label {
            display: inline-flex;
            align-items: center;
            margin-right: 24px;
            cursor: pointer;
        }
        .best-match-highlight {
            background: linear-gradient(120deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body class="min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-6xl">
        <!-- 头部 -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PIPEI</h1>
            <p class="text-gray-600 mt-2 text-lg">上传简历 · 粘贴JD · 智能分析与匹配</p>
        </div>

        <!-- 左右两栏 -->
        <div class="grid md:grid-cols-2 gap-8 mb-8">
            <!-- 左侧：简历上传 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 card-hover flex flex-col">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">📄 简历上传</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-indigo-300 transition mb-4">
                    <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                    <button id="uploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition shadow-sm">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>选择文件 (PDF/Word)
                    </button>
                    <p id="fileName" class="text-sm text-gray-500 mt-2">未选择文件</p>
                </div>
                <div class="flex-1 flex flex-col min-h-0">
                    <label class="block text-sm font-medium text-gray-700 mb-1">或直接粘贴简历文本</label>
                    <textarea id="resumeText" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500 textarea-grow" placeholder="将简历文本粘贴在这里..."></textarea>
                </div>
            </div>

            <!-- 右侧：JD输入 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 card-hover flex flex-col">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">💼 职位描述 (JD)</h2>
                <div class="flex-1 flex flex-col min-h-0">
                    <textarea id="jdText" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500 textarea-grow" placeholder="请粘贴职位描述..."></textarea>
                </div>
            </div>
        </div>

        <!-- 开始分析按钮 -->
        <div class="flex justify-center mb-8">
            <button id="analyzeBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-semibold py-3 px-10 rounded-xl shadow-lg transition transform hover:scale-105 flex items-center gap-2">
                <i class="fas fa-chart-line"></i> 开始分析
            </button>
        </div>

        <!-- 结果展示区（选项卡） -->
        <div class="bg-white rounded-2xl shadow-xl p-6 card-hover">
            <div class="border-b border-gray-200 flex justify-between items-center flex-wrap">
                <nav class="flex gap-6">
                    <button id="tabTranslate" class="py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium">📖 JD分析</button>
                    <button id="tabMatch" class="py-2 px-1 text-gray-500 hover:text-gray-700">🎯 智能匹配</button>
                    <button id="tabJobRec" class="py-2 px-1 text-gray-500 hover:text-gray-700">✨ 岗位推荐</button>
                </nav>
                <div id="languageSelector" class="hidden md:block mt-2 md:mt-0">
                    <select id="jobRecLang" class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 bg-white">
                        <option value="zh">🌐 中文</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>
            <div id="resultContainer" class="mt-6">
                <div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2">
                    <i class="fas fa-lightbulb text-4xl opacity-30"></i>
                    <p>点击「开始分析」按钮，结果将显示在这里</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 灵魂匹配弹窗（隐藏） -->
    <div id="soulMatchModal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-indigo-800">🔮 灵魂匹配</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times"></i></button>
            </div>
            <div id="questionsArea">
                <!-- 动态生成6道题 -->
            </div>
            <div class="mt-6 flex gap-3 justify-end">
                <button id="cancelMatchBtn" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">取消</button>
                <button id="submitMatchBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">分析</button>
            </div>
            <div id="matchResultArea" class="mt-4 hidden"></div>
        </div>
    </div>

    <script>
        // DOM 元素
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');
        const resumeTextArea = document.getElementById('resumeText');
        const jdTextArea = document.getElementById('jdText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const tabTranslateBtn = document.getElementById('tabTranslate');
        const tabMatchBtn = document.getElementById('tabMatch');
        const tabJobRecBtn = document.getElementById('tabJobRec');
        const resultContainer = document.getElementById('resultContainer');
        const languageSelector = document.getElementById('languageSelector');
        const jobRecLang = document.getElementById('jobRecLang');
        const modal = document.getElementById('soulMatchModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelMatchBtn = document.getElementById('cancelMatchBtn');
        const submitMatchBtn = document.getElementById('submitMatchBtn');
        const matchResultArea = document.getElementById('matchResultArea');

        // 状态变量
        let resumeTextContent = "";
        let translationResult = null;
        let matchResult = null;
        let currentTab = "translate";
        let isAnalyzing = false;

        // 岗位推荐相关
        let jobRecommendations = null;      // 存储 { jobs, best_match, best_reason }
        let currentJobRecLang = "zh";
        let isJobRecLoading = false;
        let questions = [
            { text: "你更喜欢的工作节奏是？", options: ["快速变化，多任务并行", "稳定有序，深度专注"], codes: ["A","B"] },
            { text: "在团队中你通常扮演什么角色？", options: ["创意提出者", "执行推动者", "协调沟通者"], codes: ["A","B","C"] },
            { text: "你更擅长处理哪类问题？", options: ["抽象的逻辑与数据", "具体的人际与流程"], codes: ["A","B"] },
            { text: "你对数字的敏感度如何？", options: ["很高，喜欢分析数据", "一般，更关注业务含义"], codes: ["A","B"] },
            { text: "你更希望工作成果是？", options: ["可量化的指标提升", "用户或同事的认可"], codes: ["A","B"] },
            { text: "你对未知领域的探索意愿？", options: ["强烈，喜欢新工具/方法", "谨慎，偏好成熟方案"], codes: ["A","B"] }
        ];
        let userAnswers = ["", "", "", "", "", ""]; // 存储每道题的答案编码

        // 辅助函数
        function showLoading() {
            return `<div class="flex justify-center py-12"><div class="loader"></div><span class="ml-3 text-gray-600">分析中，请稍候...</span></div>`;
        }

        function showError(message) {
            return `<div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
        }

        async function callDifyAPI(inputs, apiKey, workflowType = 'main') {
            // 使用 main 工作流还是 job recommender 工作流
            let url = '';
            let key = '';
            if (workflowType === 'main') {
                url = 'https://api.dify.ai/v1/workflows/run';
                key = 'app-你的主工作流API密钥'; // 请替换
            } else {
                url = 'https://api.dify.ai/v1/workflows/run';
                key = 'app-你的岗位推荐工作流API密钥'; // 请替换
            }
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs, user: 'anonymous' })
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API 调用失败: ${response.status} ${text}`);
            }
            const data = await response.json();
            return data;
        }

        // 由于实际密钥不能暴露在前端，这里提供两个函数，你需要通过环境变量或代理来隐藏密钥。
        // 为了演示，我将使用占位符，实际部署时请替换为正确的调用方式（例如调用 Vercel 代理函数）。
        // 为了快速 MVP，我假设你已经在 Vercel 中设置了环境变量，并通过 /api/dify 代理主工作流。
        // 对于新的岗位推荐工作流，我们也可以创建一个新的代理 /api/job-recommend。
        // 但为了简化，我会直接调用 Dify API，你需要将下面的密钥替换为真实值（注意安全，仅供测试）。
        // 在生产环境，强烈建议使用 Vercel 代理。

        // 临时方案：直接调用（请将密钥填入下方）
        const MAIN_WORKFLOW_API_KEY = 'app-你的主工作流密钥';   // 替换
        const JOB_REC_WORKFLOW_API_KEY = 'app-你的岗位推荐密钥'; // 替换

        async function callMainWorkflow(inputs) {
            return callDifyAPI(inputs, MAIN_WORKFLOW_API_KEY, 'main');
        }

        async function callJobRecWorkflow(inputs) {
            return callDifyAPI(inputs, JOB_REC_WORKFLOW_API_KEY, 'job');
        }

        // PDF/Word 解析（复用原有代码）
        function parsePDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const typedarray = new Uint8Array(e.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let fullText = "";
                        const pages = [];
                        for (let i = 1; i <= pdf.numPages; i++) pages.push(pdf.getPage(i));
                        Promise.all(pages).then(pages => {
                            let pagePromises = pages.map(page => page.getTextContent());
                            Promise.all(pagePromises).then(textContents => {
                                textContents.forEach(textContent => {
                                    textContent.items.forEach(item => { fullText += item.str + " "; });
                                });
                                resolve(fullText.trim());
                            }).catch(reject);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function parseDOCX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => resolve(result.value))
                        .catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        uploadBtn.addEventListener('click', () => resumeFileInput.click());
        resumeFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    text = await parsePDF(file);
                } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                    text = await parseDOCX(file);
                } else {
                    alert("不支持的文件类型，请上传 PDF 或 Word 文档");
                    resumeFileInput.value = '';
                    fileNameSpan.textContent = "未选择文件";
                    return;
                }
                resumeTextContent = text;
                resumeTextArea.value = text;
            } catch (error) {
                console.error(error);
                alert("文件解析失败，请尝试直接粘贴文本");
                resumeFileInput.value = '';
                fileNameSpan.textContent = "未选择文件";
                resumeTextContent = "";
                resumeTextArea.value = "";
            }
        });

        resumeTextArea.addEventListener('input', () => {
            resumeFileInput.value = '';
            fileNameSpan.textContent = "未选择文件";
            resumeTextContent = resumeTextArea.value;
        });

        // 解析 JD 翻译文本为三个部分
        function parseTranslationToSections(text) {
            let responsibilities = "", requirements = "", plus = "";
            const sections = { "岗位职责": "", "岗位要求": "", "加分项": "" };
            let currentSection = null;
            const lines = text.split('\n');
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed.includes("岗位职责")) {
                    currentSection = "岗位职责";
                    continue;
                } else if (trimmed.includes("岗位要求")) {
                    currentSection = "岗位要求";
                    continue;
                } else if (trimmed.includes("加分项")) {
                    currentSection = "加分项";
                    continue;
                }
                if (currentSection && trimmed) {
                    sections[currentSection] += trimmed + "\n";
                }
            }
            return {
                responsibilities: sections["岗位职责"].trim(),
                requirements: sections["岗位要求"].trim(),
                plus: sections["加分项"].trim()
            };
        }

        function renderTranslation(text) {
            const { responsibilities, requirements, plus } = parseTranslationToSections(text);
            const cardClass = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition";
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-tasks text-indigo-500"></i><h3 class="font-semibold text-gray-800">岗位职责</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${responsibilities ? responsibilities.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-clipboard-list text-indigo-500"></i><h3 class="font-semibold text-gray-800">岗位要求</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${requirements ? requirements.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-star text-indigo-500"></i><h3 class="font-semibold text-gray-800">加分项</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${plus ? plus.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                </div>
            `;
        }

        function cleanText(text) {
            return text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function renderMatchResult(data) {
            const overall = data.overall_match || { score: 0, reason: '' };
            const subs = data.sub_scores || { skills: 0, experience: 0, education: 0 };
            const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
            const advice = data.application_advice || { suggestion: '', reason: '' };
            const keepItems = opt.keep.map(k => `<li>${cleanText(k)}</li>`).join('');
            const weakenItems = opt.weaken.map(w => `<li>${cleanText(w)}</li>`).join('');
            const deepenItems = opt.deepen.map(d => `<li>${cleanText(d)}</li>`).join('');
            const notMatchItems = opt.not_match.map(n => `<li>${cleanText(n)}</li>`).join('');
            const cardClass = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition";
            return `
                <div class="mb-6">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="text-2xl font-bold text-indigo-600">匹配度 ${overall.score}%</div>
                        <div class="text-sm text-gray-500">${overall.reason}</div>
                    </div>
                    <div class="mt-2 flex flex-wrap gap-4 text-sm">
                        <span><i class="fas fa-code mr-1"></i>技能匹配: ${subs.skills}%</span>
                        <span><i class="fas fa-briefcase mr-1"></i>经验匹配: ${subs.experience}%</span>
                        <span><i class="fas fa-graduation-cap mr-1"></i>教育匹配: ${subs.education}%</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="${cardClass}"><h3 class="font-semibold text-green-700" title="这些是与岗位高度匹配的经历或技能，建议在简历中保留并突出。">✅ 强匹配</h3><ul class="mt-2 custom-list">${keepItems || '<li>无</li>'}</ul></div>
                    <div class="${cardClass}"><h3 class="font-semibold text-yellow-700" title="这些内容与岗位关联度低或描述冗长，建议精简或删除。">⚠️ 可弱化</h3><ul class="mt-2 custom-list">${weakenItems || '<li>无</li>'}</ul></div>
                    <div class="${cardClass}"><h3 class="font-semibold text-blue-700" title="简历中已提及但描述不够充分的能力或项目，建议补充细节。">🔍 可深挖</h3><ul class="mt-2 custom-list">${deepenItems || '<li>无</li>'}</ul></div>
                    <div class="${cardClass}"><h3 class="font-semibold text-red-700" title="岗位要求但简历中缺失的能力，建议补充学习或强调可迁移经验。">❌ 不匹配</h3><ul class="mt-2 custom-list">${notMatchItems || '<li>无</li>'}</ul></div>
                </div>
                <div class="mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                    <div class="flex items-start gap-2"><i class="fas fa-lightbulb text-indigo-600 mt-0.5"></i><div><span class="font-semibold text-indigo-800">投递建议：</span> <span class="text-indigo-700">${advice.suggestion}</span><p class="text-gray-700 text-sm mt-1">${advice.reason}</p></div></div>
                </div>
            `;
        }

        // 渲染岗位推荐
        function renderJobRecommendations(data) {
            const jobs = data.jobs || [];
            if (!jobs.length) return '<div class="text-center py-8 text-gray-500">暂无推荐岗位，请确保简历已填写完整。</div>';
            let html = `<div class="space-y-6">`;
            jobs.forEach((job, idx) => {
                html += `
                    <div class="border rounded-xl p-4 bg-gray-50">
                        <div class="flex justify-between items-start flex-wrap">
                            <h3 class="text-lg font-bold text-indigo-800">${idx+1}. ${job.title}</h3>
                            <span class="bg-indigo-100 text-indigo-800 text-sm font-semibold px-2.5 py-0.5 rounded-full">匹配度 ${job.match_score}%</span>
                        </div>
                        <p class="text-gray-600 text-sm mt-1">${job.description}</p>
                        <div class="mt-2">
                            <span class="text-xs font-semibold text-gray-500">🔑 关键词：</span>
                            <div class="flex flex-wrap gap-1 mt-1">
                                ${job.keywords.map(kw => `<span class="bg-white border border-gray-200 text-gray-700 text-xs rounded-full px-2 py-0.5">${kw}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            if (data.best_match && data.best_reason) {
                html += `
                    <div class="best-match-highlight">
                        <div class="flex items-center gap-2"><i class="fas fa-star text-amber-500"></i><span class="font-bold text-amber-700">✨ 灵魂匹配推荐</span></div>
                        <div class="mt-1 font-medium">最适合你的岗位：${data.best_match.title} (匹配度 ${data.best_match.match_score}%)</div>
                        <div class="text-sm text-gray-700 mt-1">${data.best_reason}</div>
                    </div>
                `;
            }
            html += `</div>`;
            return html;
        }

        async function loadJobRecommendations(lang) {
            if (!resumeTextContent) {
                resultContainer.innerHTML = showError("请先上传或粘贴简历内容");
                return;
            }
            isJobRecLoading = true;
            resultContainer.innerHTML = showLoading();
            try {
                const inputs = { resume_text: resumeTextContent, language: lang };
                // 注意：这里需要调用 JobRecommender 工作流
                const response = await callJobRecWorkflow(inputs);
                let data = response.data.outputs.result; // 根据实际输出调整
                if (typeof data === 'string') data = JSON.parse(data);
                jobRecommendations = data;
                resultContainer.innerHTML = renderJobRecommendations(jobRecommendations);
            } catch (err) {
                resultContainer.innerHTML = showError(err.message);
            } finally {
                isJobRecLoading = false;
            }
        }

        // 灵魂匹配弹窗逻辑
        function buildQuestions() {
            const container = document.getElementById('questionsArea');
            let html = '';
            questions.forEach((q, idx) => {
                html += `<div class="question-item"><p class="font-medium text-gray-800 mb-2">${idx+1}. ${q.text}</p><div class="flex flex-wrap gap-4">`;
                q.options.forEach((opt, optIdx) => {
                    const code = q.codes[optIdx];
                    const checked = (userAnswers[idx] === code) ? 'checked' : '';
                    html += `<label class="option-label"><input type="radio" name="q${idx}" value="${code}" ${checked} class="mr-1"> ${opt}</label>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
            // 绑定 change 事件
            for (let i = 0; i < questions.length; i++) {
                const radios = document.querySelectorAll(`input[name="q${i}"]`);
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        userAnswers[i] = e.target.value;
                    });
                });
            }
        }

        function openModal() {
            buildQuestions();
            matchResultArea.classList.add('hidden');
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        async function submitMatch() {
            // 检查是否所有问题都已作答
            if (userAnswers.some(ans => !ans)) {
                alert("请回答所有问题");
                return;
            }
            const preferences = userAnswers.join(',');
            if (!jobRecommendations || !jobRecommendations.jobs) {
                alert("请先获取岗位推荐");
                closeModal();
                return;
            }
            // 调用同一工作流，传入 preferences
            matchResultArea.classList.remove('hidden');
            matchResultArea.innerHTML = '<div class="text-center py-4"><div class="loader mx-auto"></div><p class="mt-2">分析中...</p></div>';
            try {
                const inputs = { resume_text: resumeTextContent, language: currentJobRecLang, preferences: preferences };
                const response = await callJobRecWorkflow(inputs);
                let data = response.data.outputs.result;
                if (typeof data === 'string') data = JSON.parse(data);
                // 更新全局 jobRecommendations 并重新渲染
                jobRecommendations = data;
                // 关闭弹窗，在主区域显示结果并高亮 best_match
                closeModal();
                if (resultContainer && currentTab === 'jobrec') {
                    resultContainer.innerHTML = renderJobRecommendations(jobRecommendations);
                } else {
                    // 如果用户在其他选项卡，切换过去
                    switchTab('jobrec');
                }
            } catch (err) {
                matchResultArea.innerHTML = showError(err.message);
            }
        }

        // 选项卡切换
        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'translate') {
                tabTranslateBtn.className = "py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabMatchBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                tabJobRecBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                languageSelector.classList.add('hidden');
                if (translationResult) {
                    resultContainer.innerHTML = renderTranslation(translationResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2"><i class="fas fa-file-alt text-4xl opacity-30"></i><p>暂无JD分析结果，请点击「开始分析」</p></div>';
                }
            } else if (tab === 'match') {
                tabMatchBtn.className = "py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabTranslateBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                tabJobRecBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                languageSelector.classList.add('hidden');
                if (matchResult) {
                    resultContainer.innerHTML = renderMatchResult(matchResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2"><i class="fas fa-chart-line text-4xl opacity-30"></i><p>暂无匹配结果，请点击「开始分析」</p></div>';
                }
            } else if (tab === 'jobrec') {
                tabJobRecBtn.className = "py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabTranslateBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                tabMatchBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
                languageSelector.classList.remove('hidden');
                if (jobRecommendations) {
                    resultContainer.innerHTML = renderJobRecommendations(jobRecommendations);
                } else if (resumeTextContent) {
                    loadJobRecommendations(currentJobRecLang);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2"><i class="fas fa-briefcase text-4xl opacity-30"></i><p>请先上传简历，然后点击「岗位推荐」</p></div>';
                }
            }
        }

        // 语言切换
        jobRecLang.addEventListener('change', (e) => {
            currentJobRecLang = e.target.value;
            if (currentTab === 'jobrec' && resumeTextContent) {
                loadJobRecommendations(currentJobRecLang);
            }
        });

        // 开始分析按钮（保持原有逻辑）
        analyzeBtn.addEventListener('click', async () => {
            const jd = jdTextArea.value.trim();
            if (!jd) { alert("请粘贴职位描述"); return; }
            if (!resumeTextContent) { alert("请先上传简历或粘贴简历文本"); return; }
            translationResult = null;
            matchResult = null;
            isAnalyzing = true;
            if (currentTab === 'translate' || currentTab === 'match') {
                resultContainer.innerHTML = showLoading();
            }
            try {
                const result = await callMainWorkflow({ jd_text: jd, resume_text: resumeTextContent });
                translationResult = result.data.outputs.translation;
                const analysisRaw = result.data.outputs.analysis;
                matchResult = JSON.parse(analysisRaw);
                isAnalyzing = false;
                if (currentTab === 'translate') switchTab('translate');
                else if (currentTab === 'match') switchTab('match');
                else switchTab('translate');
            } catch (err) {
                isAnalyzing = false;
                resultContainer.innerHTML = showError(err.message);
            }
        });

        tabTranslateBtn.addEventListener('click', () => switchTab('translate'));
        tabMatchBtn.addEventListener('click', () => switchTab('match'));
        tabJobRecBtn.addEventListener('click', () => switchTab('jobrec'));
        closeModalBtn.addEventListener('click', closeModal);
        cancelMatchBtn.addEventListener('click', closeModal);
        submitMatchBtn.addEventListener('click', submitMatch);

        // 添加灵魂匹配按钮到岗位推荐结果区域（动态）
        // 在 renderJobRecommendations 中增加按钮
        const originalRender = renderJobRecommendations;
        window.renderJobRecommendations = function(data) {
            let html = originalRender(data);
            if (data.jobs && data.jobs.length) {
                html += `<div class="mt-6 text-center"><button id="soulMatchTriggerBtn" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white font-semibold py-2 px-6 rounded-xl shadow hover:scale-105 transition"><i class="fas fa-heart mr-2"></i>🔮 灵魂匹配</button></div>`;
            }
            return html;
        };
        // 覆盖原来的渲染函数
        renderJobRecommendations = function(data) {
            let html = originalRender(data);
            if (data.jobs && data.jobs.length) {
                html += `<div class="mt-6 text-center"><button id="soulMatchTriggerBtn" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white font-semibold py-2 px-6 rounded-xl shadow hover:scale-105 transition"><i class="fas fa-heart mr-2"></i>🔮 灵魂匹配</button></div>`;
            }
            return html;
        };
        // 在 resultContainer 内容更新后绑定按钮事件
        function bindSoulMatchButton() {
            const btn = document.getElementById('soulMatchTriggerBtn');
            if (btn) {
                btn.removeEventListener('click', openModal);
                btn.addEventListener('click', openModal);
            }
        }
        // 修改 loadJobRecommendations 和渲染后调用
        const originalLoad = loadJobRecommendations;
        window.loadJobRecommendations = async function(lang) {
            await originalLoad(lang);
            bindSoulMatchButton();
        };
        loadJobRecommendations = async function(lang) {
            await originalLoad(lang);
            bindSoulMatchButton();
        };
    </script>
</body>
</html>
