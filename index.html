<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPEI · 智能求职助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Word 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .tab-active {
            border-bottom-width: 2px;
            border-color: #4f46e5;
            color: #4f46e5;
        }
        .tab-inactive {
            border-bottom-width: 2px;
            border-color: transparent;
            color: #6b7280;
        }
        .tab-inactive:hover {
            color: #1f2937;
        }
        .flex-col-stretch {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .textarea-grow {
            flex: 1;
            min-height: 0;
        }
        .custom-list {
            list-style-type: disc;
            padding-left: 1.25rem;
        }
        .custom-list li {
            margin-bottom: 0.25rem;
            white-space: normal;
            word-break: break-word;
        }
    </style>
</head>
<body class="min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-6xl">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PIPEI</h1>
            <p class="text-gray-600 mt-2 text-lg">上传简历 · 粘贴JD · 智能分析与匹配</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-8">
            <!-- 左侧：简历上传 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 card-hover flex flex-col">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">📄 简历上传</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-indigo-300 transition mb-4">
                    <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                    <button id="uploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition shadow-sm">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>选择文件 (PDF/Word)
                    </button>
                    <p id="fileName" class="text-sm text-gray-500 mt-2">未选择文件</p>
                </div>
                <div class="flex-1 flex flex-col min-h-0">
                    <label class="block text-sm font-medium text-gray-700 mb-1">或直接粘贴简历文本</label>
                    <textarea id="resumeText" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500 textarea-grow" placeholder="将简历文本粘贴在这里..."></textarea>
                </div>
            </div>

            <!-- 右侧：JD输入 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 card-hover flex flex-col">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">💼 职位描述 (JD)</h2>
                <div class="flex-1 flex flex-col min-h-0">
                    <textarea id="jdText" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500 textarea-grow" placeholder="请粘贴职位描述..."></textarea>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <button id="analyzeBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-semibold py-3 px-10 rounded-xl shadow-lg transition transform hover:scale-105 flex items-center gap-2">
                <i class="fas fa-chart-line"></i> 开始分析
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 card-hover">
            <div class="border-b border-gray-200">
                <nav class="flex gap-6">
                    <button id="tabTranslate" class="py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium">📖 JD分析</button>
                    <button id="tabMatch" class="py-2 px-1 text-gray-500 hover:text-gray-700">🎯 智能匹配</button>
                </nav>
            </div>
            <div id="resultContainer" class="mt-6">
                <div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2">
                    <i class="fas fa-lightbulb text-4xl opacity-30"></i>
                    <p>点击「开始分析」按钮，结果将显示在这里</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');
        const resumeTextArea = document.getElementById('resumeText');
        const jdTextArea = document.getElementById('jdText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const tabTranslateBtn = document.getElementById('tabTranslate');
        const tabMatchBtn = document.getElementById('tabMatch');
        const resultContainer = document.getElementById('resultContainer');

        let resumeTextContent = "";
        let translationResult = null;
        let matchResult = null;
        let currentTab = "translate";
        let isAnalyzing = false;

        function showLoading() {
            return `<div class="flex justify-center py-12"><div class="loader"></div><span class="ml-3 text-gray-600">分析中，请稍候...</span></div>`;
        }

        function showError(message) {
            return `<div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
        }

        async function callDifyAPI(inputs) {
            const response = await fetch('/api/dify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API 调用失败: ${response.status} ${text}`);
            }
            const data = await response.json();
            return data;
        }

        // PDF 解析
        function parsePDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const typedarray = new Uint8Array(e.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let fullText = "";
                        const pages = [];
                        for (let i = 1; i <= pdf.numPages; i++) pages.push(pdf.getPage(i));
                        Promise.all(pages).then(pages => {
                            let pagePromises = pages.map(page => page.getTextContent());
                            Promise.all(pagePromises).then(textContents => {
                                textContents.forEach(textContent => {
                                    textContent.items.forEach(item => { fullText += item.str + " "; });
                                });
                                resolve(fullText.trim());
                            }).catch(reject);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // Word 解析
        function parseDOCX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => resolve(result.value))
                        .catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // 文件上传
        uploadBtn.addEventListener('click', () => resumeFileInput.click());
        resumeFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    text = await parsePDF(file);
                } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                    text = await parseDOCX(file);
                } else {
                    alert("不支持的文件类型，请上传 PDF 或 Word 文档");
                    // 清空文件状态
                    resumeFileInput.value = '';
                    fileNameSpan.textContent = "未选择文件";
                    return;
                }
                resumeTextContent = text;
                resumeTextArea.value = text;   // 同步到文本区
            } catch (error) {
                console.error(error);
                alert("文件解析失败，请尝试直接粘贴文本");
                // 解析失败，清空文件状态
                resumeFileInput.value = '';
                fileNameSpan.textContent = "未选择文件";
                resumeTextContent = "";
                resumeTextArea.value = "";
            }
        });

        // 手动输入简历文本（互斥：清空文件上传状态）
        resumeTextArea.addEventListener('input', () => {
            // 用户手动修改文本区，则清除文件上传状态
            resumeFileInput.value = '';
            fileNameSpan.textContent = "未选择文件";
            resumeTextContent = resumeTextArea.value;  // 更新全局简历文本
        });

        // 解析 JD 翻译文本为三个部分
        function parseTranslationToSections(text) {
            let responsibilities = "", requirements = "", plus = "";
            const sections = { "岗位职责": "", "岗位要求": "", "加分项": "" };
            let currentSection = null;
            const lines = text.split('\n');
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed.includes("岗位职责")) {
                    currentSection = "岗位职责";
                    continue;
                } else if (trimmed.includes("岗位要求")) {
                    currentSection = "岗位要求";
                    continue;
                } else if (trimmed.includes("加分项")) {
                    currentSection = "加分项";
                    continue;
                }
                if (currentSection && trimmed) {
                    sections[currentSection] += trimmed + "\n";
                }
            }
            return {
                responsibilities: sections["岗位职责"].trim(),
                requirements: sections["岗位要求"].trim(),
                plus: sections["加分项"].trim()
            };
        }

        function renderTranslation(text) {
            const { responsibilities, requirements, plus } = parseTranslationToSections(text);
            const cardClass = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition";
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-tasks text-indigo-500"></i><h3 class="font-semibold text-gray-800">岗位职责</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${responsibilities ? responsibilities.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-clipboard-list text-indigo-500"></i><h3 class="font-semibold text-gray-800">岗位要求</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${requirements ? requirements.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                    <div class="${cardClass}">
                        <div class="flex items-center gap-2 mb-3 border-b pb-2"><i class="fas fa-star text-indigo-500"></i><h3 class="font-semibold text-gray-800">加分项</h3></div>
                        <div class="text-sm text-gray-700 whitespace-pre-wrap">${plus ? plus.replace(/\n/g, '<br>') : '<span class="text-gray-400 italic">无</span>'}</div>
                    </div>
                </div>
            `;
        }

        function cleanText(text) {
            return text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function renderMatchResult(data) {
            const overall = data.overall_match || { score: 0, reason: '' };
            const subs = data.sub_scores || { skills: 0, experience: 0, education: 0 };
            const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
            const advice = data.application_advice || { suggestion: '', reason: '' };
            const keepItems = opt.keep.map(k => `<li>${cleanText(k)}</li>`).join('');
            const weakenItems = opt.weaken.map(w => `<li>${cleanText(w)}</li>`).join('');
            const deepenItems = opt.deepen.map(d => `<li>${cleanText(d)}</li>`).join('');
            const notMatchItems = opt.not_match.map(n => `<li>${cleanText(n)}</li>`).join('');
            const cardClass = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition";
            return `
                <div class="mb-6">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="text-2xl font-bold text-indigo-600">匹配度 ${overall.score}%</div>
                        <div class="text-sm text-gray-500">${overall.reason}</div>
                    </div>
                    <div class="mt-2 flex flex-wrap gap-4 text-sm">
                        <span><i class="fas fa-code mr-1"></i>技能匹配: ${subs.skills}%</span>
                        <span><i class="fas fa-briefcase mr-1"></i>经验匹配: ${subs.experience}%</span>
                        <span><i class="fas fa-graduation-cap mr-1"></i>教育匹配: ${subs.education}%</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="${cardClass}">
                        <h3 class="font-semibold text-green-700" title="这些是与岗位高度匹配的经历或技能，建议在简历中保留并突出，如加粗、前置或扩展描述。">✅ 强匹配</h3>
                        <ul class="mt-2 custom-list">${keepItems || '<li>无</li>'}</ul>
                    </div>
                    <div class="${cardClass}">
                        <h3 class="font-semibold text-yellow-700" title="这些内容与岗位关联度低或描述冗长，建议精简或删除，让简历更聚焦核心优势。">⚠️ 可弱化</h3>
                        <ul class="mt-2 custom-list">${weakenItems || '<li>无</li>'}</ul>
                    </div>
                    <div class="${cardClass}">
                        <h3 class="font-semibold text-blue-700" title="简历中已提及但描述不够充分的能力或项目，建议补充细节（如成果、数据、工具），增强说服力。">🔍 可深挖</h3>
                        <ul class="mt-2 custom-list">${deepenItems || '<li>无</li>'}</ul>
                    </div>
                    <div class="${cardClass}">
                        <h3 class="font-semibold text-red-700" title="岗位要求但简历中缺失的能力，建议补充学习或强调可迁移经验，并在求职信中说明快速学习意愿。">❌ 不匹配</h3>
                        <ul class="mt-2 custom-list">${notMatchItems || '<li>无</li>'}</ul>
                    </div>
                </div>
                <div class="mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                    <div class="flex items-start gap-2"><i class="fas fa-lightbulb text-indigo-600 mt-0.5"></i><div><span class="font-semibold text-indigo-800">投递建议：</span> <span class="text-indigo-700">${advice.suggestion}</span><p class="text-gray-700 text-sm mt-1">${advice.reason}</p></div></div>
                </div>
            `;
        }

        function updateResultDisplay() {
            if (currentTab === 'translate') {
                if (isAnalyzing) {
                    resultContainer.innerHTML = showLoading();
                } else if (translationResult) {
                    resultContainer.innerHTML = renderTranslation(translationResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2"><i class="fas fa-file-alt text-4xl opacity-30"></i><p>暂无JD分析结果，请点击「开始分析」</p></div>';
                }
            } else {
                if (isAnalyzing) {
                    resultContainer.innerHTML = showLoading();
                } else if (matchResult) {
                    resultContainer.innerHTML = renderMatchResult(matchResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-12 flex flex-col items-center gap-2"><i class="fas fa-chart-line text-4xl opacity-30"></i><p>暂无匹配结果，请点击「开始分析」</p></div>';
                }
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'translate') {
                tabTranslateBtn.className = "py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabMatchBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
            } else {
                tabMatchBtn.className = "py-2 px-1 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabTranslateBtn.className = "py-2 px-1 text-gray-500 hover:text-gray-700";
            }
            updateResultDisplay();
        }

        tabTranslateBtn.addEventListener('click', () => switchTab('translate'));
        tabMatchBtn.addEventListener('click', () => switchTab('match'));

        analyzeBtn.addEventListener('click', async () => {
            const jd = jdTextArea.value.trim();
            if (!jd) {
                alert("请粘贴职位描述");
                return;
            }
            if (!resumeTextContent) {
                alert("请先上传简历或粘贴简历文本");
                return;
            }

            // 开始分析：清空结果，标记分析中，刷新显示
            translationResult = null;
            matchResult = null;
            isAnalyzing = true;
            updateResultDisplay();

            try {
                const result = await callDifyAPI({
                    jd_text: jd,
                    resume_text: resumeTextContent
                });
                translationResult = result.data.outputs.translation;
                const analysisRaw = result.data.outputs.analysis;
                try {
                    matchResult = JSON.parse(analysisRaw);
                } catch (e) {
                    console.warn("匹配结果不是 JSON，原样显示");
                    matchResult = null;
                    resultContainer.innerHTML = `<div class="bg-yellow-50 p-4 rounded-lg">匹配结果格式异常，原始内容：<pre>${analysisRaw}</pre></div>`;
                    isAnalyzing = false;
                    return;
                }
                isAnalyzing = false;
                updateResultDisplay();
            } catch (err) {
                isAnalyzing = false;
                resultContainer.innerHTML = showError(err.message);
            }
        });
    </script>
</body>
</html>
