<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIPEI · 智能求职规划专家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-gradient);
            color: #1e293b;
        }

        /* 磨砂玻璃效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* 按钮动效 */
        .btn-primary {
            background: var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.4);
        }

        /* 状态切换标签 */
        .mode-btn {
            position: relative;
            transition: all 0.3s;
        }
        .mode-btn-active {
            color: var(--primary);
            font-weight: 700;
        }
        .mode-btn-active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 99px;
        }

        /* 加载动画优化 */
        .loader-orbit {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 卡片内边框增强专业感 */
        .pro-border { border-left: 4px solid var(--primary); }
        .match-tag {
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        .custom-list-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .custom-list-item::before {
            content: "→";
            color: var(--primary);
            font-weight: bold;
            font-size: 0.8em;
            margin-top: 2px;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="sticky top-0 z-40 w-full glass-card mb-8">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-paper-plane text-white text-sm"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-slate-800">PIPEI</span>
            </div>
            <div class="hidden md:flex gap-8">
                <button id="modeRecommendBtn" class="mode-btn mode-btn-active text-sm">岗位推荐</button>
                <button id="modeAnalyzeBtn" class="mode-btn text-slate-500 hover:text-indigo-600 text-sm">岗位匹配分析</button>
            </div>
            <div class="text-xs text-slate-400 font-medium">V1.2.0 Stable</div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-1 glass-card rounded-2xl p-6">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Step 1. 上传简历</h2>
                <div class="relative border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:bg-indigo-50/30 transition-all cursor-pointer group" id="dropZone">
                    <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                    <div class="text-indigo-500 mb-3 group-hover:scale-110 transition-transform">
                        <i class="fas fa-file-invoice text-3xl"></i>
                    </div>
                    <button id="uploadBtn" class="text-sm font-semibold text-slate-700">点击上传简历</button>
                    <p id="fileName" class="text-xs text-slate-400 mt-2 truncate">支持 PDF / DOCX 格式</p>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest" id="step2Title">Step 2. 补充信息</h2>
                    <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-md text-slate-400">自动解析</span>
                </div>
                <textarea id="resumeText" rows="5" 
                    class="w-full bg-slate-50/50 border border-slate-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all outline-none" 
                    placeholder="解析后的简历文本将显示在此，或直接粘贴..."></textarea>
            </div>
        </div>

        <main class="glass-card rounded-3xl overflow-hidden min-h-[500px]">
            <div class="bg-white/50 border-b border-slate-100 px-8 py-5 flex justify-between items-center">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full"></span>
                    核心工作区
                </h3>
                <div id="recommendControls" class="flex items-center gap-3">
                    <span class="text-xs text-slate-400 font-medium">语言偏好:</span>
                    <select id="langSelect" class="bg-slate-100 border-none rounded-lg px-3 py-1.5 text-xs font-bold text-slate-600 outline-none cursor-pointer hover:bg-slate-200 transition">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <div id="dynamicContent" class="p-8">
                <div id="recommendPanel">
                    <div class="flex flex-col items-center justify-center py-12" id="recommendEmptyState">
                        <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-4 text-indigo-300">
                            <i class="fas fa-search-dollar text-3xl"></i>
                        </div>
                        <h4 class="text-slate-800 font-semibold">准备好开启职业机会了吗？</h4>
                        <p class="text-slate-400 text-sm mt-1 mb-6">我们将根据您的简历背景推荐最合适的岗位方向</p>
                        <button id="startRecommendBtn" class="btn-primary text-white font-bold py-3 px-10 rounded-xl shadow-lg">
                            立即开始智能匹配
                        </button>
                    </div>
                    <div id="recommendResult" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

                <div id="analyzePanel" class="hidden">
                    <div class="mb-6">
                        <textarea id="jdText" rows="6" 
                            class="w-full border-2 border-slate-100 rounded-2xl p-4 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all outline-none" 
                            placeholder="请粘贴您心仪职位的 JD (Job Description)..."></textarea>
                    </div>
                    <div class="flex justify-center mb-10">
                        <button id="startAnalyzeBtn" class="btn-primary text-white font-bold py-3 px-10 rounded-xl shadow-lg">
                            深度解析匹配度
                        </button>
                    </div>
                    <div id="analyzeResult">
                        <div class="flex border-b border-slate-100 mb-6 overflow-x-auto">
                            <button id="tabTranslateResult" class="px-6 py-3 text-sm font-bold border-b-2 border-indigo-500 text-indigo-600">JD 核心拆解</button>
                            <button id="tabMatchResult" class="px-6 py-3 text-sm font-bold text-slate-400 hover:text-slate-600">求职竞争力报告</button>
                        </div>
                        <div id="analyzeResultContent" class="text-slate-400 text-center py-10 italic">等待输入职位描述并分析...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="soulMatchModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-3xl max-w-2xl w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="bg-indigo-600 px-8 py-6 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-extrabold flex items-center gap-2">🔮 灵魂匹配测试</h2>
                    <p class="text-indigo-100 text-xs mt-1">从性格与潜能出发，寻找最适合你的职业灵魂</p>
                </div>
                <button id="closeModalBtn" class="hover:rotate-90 transition-transform"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-8 max-h-[60vh] overflow-y-auto" id="modalQuestions"></div>
            <div class="px-8 py-6 bg-slate-50 flex justify-end gap-3">
                <button id="cancelModalBtn" class="px-6 py-2 text-sm font-bold text-slate-400 hover:text-slate-600">下次再说</button>
                <button id="submitPreferencesBtn" class="btn-primary px-8 py-2 text-white text-sm font-bold rounded-xl">生成灵魂报告</button>
            </div>
        </div>
    </div>

    <script>
        // --- 逻辑部分保持原逻辑，主要修改渲染相关的 HTML 字符串以匹配新 UI ---
        
        // 核心变量 (同原版)
        let resumeTextContent = "";
        let translationResult = null;
        let matchResult = null;
        let currentMode = "recommend";
        let currentRecommendLanguage = "zh";
        let currentRecommendJobs = null;
        let modalPrefs = ["", "", "", "", "", ""];

        // 渲染加载中
        function showLoading() {
            return `<div class="col-span-full flex flex-col items-center justify-center py-20">
                        <div class="loader-orbit mb-4"></div>
                        <p class="text-slate-500 font-medium animate-pulse">PIPEI 正在进行深度语义建模...</p>
                    </div>`;
        }

        // 岗位推荐列表渲染优化
        function renderJobsList(data) {
            if (!data || !data.jobs) return '';
            let html = '';
            data.jobs.forEach((job, idx) => {
                html += `
                <div class="bg-white border border-slate-100 p-6 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/10 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-indigo-500 font-bold group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                            ${idx+1}
                        </div>
                        <div class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold">
                            MATCH: ${job.match_score}%
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2">${job.title}</h3>
                    <p class="text-slate-500 text-xs leading-relaxed mb-4 line-clamp-3">${job.description}</p>
                    <div class="flex flex-wrap gap-2">
                        ${job.keywords.slice(0,3).map(kw => `<span class="match-tag px-2 py-1 rounded-md text-[10px] font-bold">${kw}</span>`).join('')}
                    </div>
                </div>`;
            });
            
            const btnHtml = `<div class="col-span-full mt-10 text-center">
                <button id="soulMatchBtn" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-sm font-bold py-3 px-8 rounded-xl shadow-xl hover:scale-105 transition">
                    🔮 开启灵魂匹配 (Soul Match)
                </button>
            </div>`;
            return html + btnHtml;
        }

        // 样式适配：选项点击
        const questions = ["你更喜欢的工作节奏是？", "在团队中通常扮演什么角色？", "更擅长处理哪类问题？", "对数字的敏感度如何？", "希望工作成果是？", "对未知领域的探索意愿？"];
        const optionsList = [["A. 快速变化，多任务并行", "B. 稳定有序，深度专注"], ["A. 创意提出者", "B. 执行推动者", "C. 协调沟通者"], ["A. 抽象的逻辑与数据", "B. 具体的人际与流程"], ["A. 很高，喜欢分析数据", "B. 一般，更关注业务含义"], ["A. 可量化的指标提升", "B. 用户认可"], ["A. 强烈，喜欢新工具", "B. 谨慎"]];
        const optionValues = [["A", "B"], ["A", "B", "C"], ["A", "B"], ["A", "B"], ["A", "B"], ["A", "B"]];

        // --- 以下是保持原功能的代码 (PDF/DOCX/API) ---
        // (由于长度关系，你可以直接复用你原版代码中的 script 核心逻辑部分，
        // 确保 DOM ID 匹配即可：resumeFile, uploadBtn, startRecommendBtn 等)

        // 初始化交互逻辑 (示例)
        const startRecommendBtn = document.getElementById('startRecommendBtn');
        const recommendEmptyState = document.getElementById('recommendEmptyState');
        const recommendResultDiv = document.getElementById('recommendResult');

        // 切换模式逻辑
        const modeRecommendBtn = document.getElementById('modeRecommendBtn');
        const modeAnalyzeBtn = document.getElementById('modeAnalyzeBtn');
        const recommendPanel = document.getElementById('recommendPanel');
        const analyzePanel = document.getElementById('analyzePanel');

        modeRecommendBtn.onclick = () => {
            modeRecommendBtn.className = "mode-btn mode-btn-active text-sm";
            modeAnalyzeBtn.className = "mode-btn text-slate-500 hover:text-indigo-600 text-sm";
            recommendPanel.classList.remove('hidden');
            analyzePanel.classList.add('hidden');
        };

        modeAnalyzeBtn.onclick = () => {
            modeAnalyzeBtn.className = "mode-btn mode-btn-active text-sm";
            modeRecommendBtn.className = "mode-btn text-slate-500 hover:text-indigo-600 text-sm";
            analyzePanel.classList.remove('hidden');
            recommendPanel.classList.add('hidden');
        };

        // 文件上传展示优化
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');

        uploadBtn.onclick = () => resumeFileInput.click();
        resumeFileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameSpan.textContent = "已就绪: " + file.name;
                fileNameSpan.className = "text-xs text-indigo-500 font-bold mt-2 truncate";
                // 此处调用你原有的 parsePDF/parseDOCX 逻辑
            }
        };

        // 重新定义 renderMatch 使其匹配新 UI
        function renderMatch(data) {
             const overall = data.overall_match || { score: 0, reason: '' };
             const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
             
             const renderBox = (title, items, color) => `
                <div class="pro-border bg-white border border-slate-100 p-5 rounded-xl shadow-sm">
                    <h4 class="font-bold text-xs uppercase tracking-tighter text-${color}-600 mb-3">${title}</h4>
                    ${items.length ? items.map(i => `<div class="custom-list-item text-sm text-slate-600">${i}</div>`).join('') : '<span class="text-slate-300 text-xs italic">无</span>'}
                </div>
             `;

             return `
                <div class="mb-8 p-6 bg-gradient-to-r from-indigo-600 to-indigo-800 rounded-2xl text-white shadow-xl">
                    <div class="flex items-center gap-6">
                        <div class="text-5xl font-black">${overall.score}%</div>
                        <div>
                            <div class="text-sm font-bold opacity-80 uppercase">总体竞争力评分</div>
                            <div class="text-xs opacity-90 mt-1">${overall.reason}</div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${renderBox('✅ 核心优势 (保留)', opt.keep, 'green')}
                    ${renderBox('🔍 挖掘空间 (深挖)', opt.deepen, 'blue')}
                    ${renderBox('⚠️ 冗余信息 (弱化)', opt.weaken, 'amber')}
                    ${renderBox('❌ 缺失维度 (补齐)', opt.not_match, 'red')}
                </div>
             `;
        }
        
        // 注意：你需要将你原有的核心 API 调用逻辑 (callPIPEI, loadRecommendations 等) 
        // 复制回这个 script 标签中，确保功能完整。
    </script>
</body>
</html>
