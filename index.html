<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIPEI · 智能求职助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(241, 245, 249, 0.8) 0%, rgba(226, 232, 240, 0.9) 100%);
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .card-hover { transition: transform 0.25s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15); }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; width: 48px; height: 48px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mode-btn { transition: all 0.2s ease; backdrop-filter: blur(4px); }
        .mode-btn-active { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .mode-btn-inactive { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); color: #334155; border: 1px solid rgba(203, 213, 225, 0.5); }
        .mode-btn-inactive:hover { background: rgba(255, 255, 255, 0.9); transform: translateY(-1px); }
        .keyword-tag {
            display: inline-block;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            color: #3730a3;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 500;
            margin: 0.2rem;
            transition: all 0.2s;
        }
        .keyword-tag:hover { background: #c7d2fe; transform: scale(1.02); }
        .best-match-highlight { border: 2px solid #f59e0b; background: linear-gradient(135deg, #fffbeb, #fef3c7); box-shadow: 0 8px 20px -6px rgba(245, 158, 11, 0.2); }
        .option-label { transition: all 0.2s; cursor: pointer; background: #f8fafc; border: 1px solid #e2e8f0; }
        .option-label.selected { background: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3); }
        .match-card { background: white; border-radius: 1.25rem; border: 1px solid #f1f5f9; transition: all 0.25s; text-align: left; }
        .match-card:hover { border-color: #e2e8f0; box-shadow: 0 8px 20px -12px rgba(0, 0, 0, 0.15); }
        .card-title-badge {
            display: inline-block;
            background: rgba(0,0,0,0.05);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .custom-list-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            justify-content: flex-start;
            text-align: left;
        }
        .custom-list-item::before {
            content: "•";
            font-weight: bold;
            color: currentColor;
            flex-shrink: 0;
            order: 1;
            margin-right: 0.5rem;
        }
        button:focus-visible { outline: 2px solid #4f46e5; outline-offset: 2px; }
        @media (max-width: 768px) { .container { padding-left: 1rem; padding-right: 1rem; } }
        .text-left-all { text-align: left; }
    </style>
</head>
<body class="min-h-screen py-8 md:py-12">
    <div class="container mx-auto px-4 max-w-5xl">
        <!-- 头部 -->
        <div class="text-center mb-8 md:mb-10">
            <h1 class="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 bg-clip-text text-transparent tracking-tight">PIPEI</h1>
            <p class="text-gray-500 mt-2 text-base md:text-lg">上传简历 · 精准求职 · AI 驱动</p>
        </div>

        <!-- 简历上传卡片 -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-white/20 p-6 mb-8 card-hover">
            <div class="flex items-center gap-2 mb-4">
                <i class="fas fa-file-alt text-indigo-500 text-xl"></i>
                <h2 class="text-xl font-semibold text-gray-800">简历上传</h2>
            </div>
            <div class="border-2 border-dashed border-indigo-200 rounded-xl p-5 text-center hover:border-indigo-400 transition mb-4 bg-indigo-50/30">
                <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                <button id="uploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-5 rounded-xl transition shadow-md hover:shadow-lg inline-flex items-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> 选择文件 (PDF/Word)
                </button>
                <p id="fileName" class="text-sm text-gray-500 mt-2">未选择文件</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">或直接粘贴简历文本</label>
                <textarea id="resumeText" rows="4" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition bg-white/80" placeholder="将简历文本粘贴在这里..."></textarea>
            </div>
        </div>

        <!-- 模式切换 -->
        <div class="flex gap-4 mb-8 justify-center">
            <button id="modeRecommendBtn" class="mode-btn mode-btn-active px-7 py-2.5 rounded-full font-medium text-base shadow-sm flex items-center gap-2">
                <i class="fas fa-magic"></i> 岗位推荐
            </button>
            <button id="modeAnalyzeBtn" class="mode-btn mode-btn-inactive px-7 py-2.5 rounded-full font-medium text-base flex items-center gap-2">
                <i class="fas fa-chart-line"></i> 岗位分析
            </button>
        </div>

        <!-- 动态内容区域 -->
        <div id="dynamicContent" class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl border border-white/30 p-6"></div>
    </div>

    <!-- 岗位推荐模式面板 -->
    <div id="recommendPanel" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2 text-gray-700">
                <i class="fas fa-language text-indigo-500"></i>
                <span>输出语言：</span>
            </div>
            <select id="langSelect" class="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white/80 focus:ring-2 focus:ring-indigo-400">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <div class="flex justify-center mb-8">
            <button id="startRecommendBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-semibold py-3 px-10 rounded-full shadow-lg transition transform hover:scale-105 flex items-center gap-2">
                <i class="fas fa-rocket"></i> 开始推荐
            </button>
        </div>
        <div id="recommendResult" class="mt-4"></div>
    </div>

    <!-- 岗位分析模式面板 -->
    <div id="analyzePanel" class="hidden">
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">💼 职位描述 (JD)</label>
            <textarea id="jdText" rows="6" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition bg-white/80" placeholder="请粘贴职位描述..."></textarea>
        </div>
        <div class="flex justify-center mb-8">
            <button id="startAnalyzeBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-semibold py-3 px-10 rounded-full shadow-lg transition transform hover:scale-105 flex items-center gap-2">
                <i class="fas fa-chart-line"></i> 开始分析
            </button>
        </div>
        <div>
            <div class="border-b border-gray-200 flex gap-6 mb-4">
                <button id="tabTranslateResult" class="pb-2 text-indigo-600 border-b-2 border-indigo-600 font-medium">📖 JD分析</button>
                <button id="tabMatchResult" class="pb-2 text-gray-500 hover:text-gray-700">🎯 智能匹配</button>
            </div>
            <div id="analyzeResultContent" class="text-gray-500 text-center py-8">点击「开始分析」查看结果</div>
        </div>
    </div>

    <!-- 灵魂匹配模态框 -->
    <div id="soulMatchModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-all">
        <div class="bg-white rounded-2xl max-w-lg w-full mx-4 p-6 max-h-[85vh] overflow-y-auto shadow-2xl border border-white/20">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">🔮 灵魂匹配</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="modalQuestions"></div>
            <div class="flex justify-end gap-3 mt-6">
                <button id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-xl text-gray-700 hover:bg-gray-50 transition">取消</button>
                <button id="submitPreferencesBtn" class="px-4 py-2 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition shadow-md">分析</button>
            </div>
            <div id="modalResult" class="mt-4"></div>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let resumeTextContent = "";
        let translationResult = null;
        let matchResult = null;
        let currentMode = "recommend";
        let currentRecommendLanguage = "zh";
        let currentRecommendJobs = null;
        let userPreferences = ["", "", "", "", "", ""];
        let modalPrefs = ["", "", "", "", "", ""];

        const questions = [
            "你更喜欢的工作节奏是？",
            "在团队中你通常扮演什么角色？",
            "你更擅长处理哪类问题？",
            "你对数字的敏感度如何？",
            "你更希望工作成果是？",
            "你对未知领域的探索意愿？"
        ];
        const optionsList = [
            ["A. 快速变化，多任务并行", "B. 稳定有序，深度专注"],
            ["A. 创意提出者", "B. 执行推动者", "C. 协调沟通者"],
            ["A. 抽象的逻辑与数据", "B. 具体的人际与流程"],
            ["A. 很高，喜欢分析数据", "B. 一般，更关注业务含义"],
            ["A. 可量化的指标提升", "B. 用户或同事的认可"],
            ["A. 强烈，喜欢新工具/方法", "B. 谨慎，偏好成熟方案"]
        ];
        const optionValues = [
            ["A", "B"],
            ["A", "B", "C"],
            ["A", "B"],
            ["A", "B"],
            ["A", "B"],
            ["A", "B"]
        ];

        // DOM 元素
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');
        const resumeTextArea = document.getElementById('resumeText');
        const modeRecommendBtn = document.getElementById('modeRecommendBtn');
        const modeAnalyzeBtn = document.getElementById('modeAnalyzeBtn');
        const dynamicContent = document.getElementById('dynamicContent');
        const recommendPanel = document.getElementById('recommendPanel');
        const analyzePanel = document.getElementById('analyzePanel');
        const startRecommendBtn = document.getElementById('startRecommendBtn');
        const recommendResultDiv = document.getElementById('recommendResult');
        const langSelect = document.getElementById('langSelect');
        const jdTextArea = document.getElementById('jdText');
        const startAnalyzeBtn = document.getElementById('startAnalyzeBtn');
        const analyzeResultContent = document.getElementById('analyzeResultContent');
        const tabTranslateResult = document.getElementById('tabTranslateResult');
        const tabMatchResult = document.getElementById('tabMatchResult');
        const modal = document.getElementById('soulMatchModal');
        const modalQuestions = document.getElementById('modalQuestions');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const submitPreferencesBtn = document.getElementById('submitPreferencesBtn');
        const modalResultDiv = document.getElementById('modalResult');

        function showLoading() {
            return `<div class="flex justify-center py-12"><div class="loader"></div><span class="ml-3 text-gray-500">分析中，请稍候...</span></div>`;
        }
        function showError(msg) {
            return `<div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl">${msg}</div>`;
        }

        async function callPIPEI(inputs) {
            const response = await fetch('/api/dify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) throw new Error(`API 调用失败: ${response.status}`);
            return response.json();
        }
        async function callJobRecommender(inputs) {
            const response = await fetch('/api/job-recommender', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) throw new Error(`岗位推荐失败: ${response.status}`);
            return response.json();
        }

        function parsePDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const typedarray = new Uint8Array(e.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let fullText = "";
                        const pages = [];
                        for (let i = 1; i <= pdf.numPages; i++) pages.push(pdf.getPage(i));
                        Promise.all(pages).then(pages => {
                            let pagePromises = pages.map(page => page.getTextContent());
                            Promise.all(pagePromises).then(textContents => {
                                textContents.forEach(textContent => {
                                    textContent.items.forEach(item => { fullText += item.str + " "; });
                                });
                                resolve(fullText.trim());
                            }).catch(reject);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }
        function parseDOCX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => resolve(result.value))
                        .catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        uploadBtn.addEventListener('click', () => resumeFileInput.click());
        resumeFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            try {
                let text = "";
                if (file.type === "application/pdf") text = await parsePDF(file);
                else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") text = await parseDOCX(file);
                else { alert("不支持的文件类型"); return; }
                resumeTextContent = text;
                resumeTextArea.value = text;
            } catch (error) { console.error(error); alert("解析失败，请尝试直接粘贴文本"); }
        });
        resumeTextArea.addEventListener('input', () => { resumeTextContent = resumeTextArea.value; });

        // 岗位推荐渲染
        function renderJobsList(data) {
            if (!data || !data.jobs || data.jobs.length === 0) return '<div class="text-center py-8 text-gray-500">暂无推荐岗位，请检查简历内容或稍后重试。</div>';
            let html = `<div class="space-y-5">`;
            data.jobs.forEach((job, idx) => {
                html += `<div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <h3 class="text-xl font-bold text-indigo-700">${idx+1}. ${job.title}</h3>
                                <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-semibold">匹配度 ${job.match_score}%</span>
                            </div>
                            <p class="text-gray-600 text-sm mt-2">${job.description}</p>
                            <div class="mt-3 flex flex-wrap gap-1">
                                ${job.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('')}
                            </div>
                        </div>`;
            });
            html += `</div>`;
            html += `<div class="mt-8 text-center"><button id="soulMatchBtn" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-2.5 px-8 rounded-full shadow-md hover:shadow-lg transition transform hover:scale-105 inline-flex items-center gap-2"><i class="fas fa-heart"></i> 灵魂匹配</button></div>`;
            return html;
        }

        function renderJobsWithBest(data) {
            if (!data || !data.jobs || data.jobs.length === 0) return '<div class="text-center py-8 text-gray-500">暂无推荐岗位</div>';
            let html = `<div class="space-y-5">`;
            data.jobs.forEach((job, idx) => {
                const isBest = data.best_match && data.best_match.title === job.title;
                html += `<div class="bg-white rounded-xl p-5 shadow-sm border ${isBest ? 'border-amber-300 best-match-highlight' : 'border-gray-100'} transition">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <h3 class="text-xl font-bold text-indigo-700">${idx+1}. ${job.title}</h3>
                                <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-semibold">匹配度 ${job.match_score}%</span>
                            </div>
                            <p class="text-gray-600 text-sm mt-2">${job.description}</p>
                            <div class="mt-3 flex flex-wrap gap-1">
                                ${job.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('')}
                            </div>
                        </div>`;
            });
            html += `</div>`;
            if (data.best_match && data.best_reason) {
                html += `<div class="mt-6 p-5 bg-amber-50 rounded-xl border border-amber-200 shadow-sm">
                            <div class="flex items-start gap-3">
                                <i class="fas fa-crown text-amber-500 text-2xl"></i>
                                <div>
                                    <span class="font-bold text-amber-800 text-lg">灵魂匹配推荐：</span>
                                    <span class="font-semibold text-amber-700">${data.best_match.title}</span>
                                    <p class="text-gray-700 text-sm mt-1">${data.best_reason}</p>
                                </div>
                            </div>
                         </div>`;
            }
            return html;
        }

        async function loadRecommendations() {
            if (!resumeTextContent) {
                recommendResultDiv.innerHTML = showError("请先上传简历");
                return;
            }
            recommendResultDiv.innerHTML = showLoading();
            try {
                const inputs = { resume_text: resumeTextContent, language: currentRecommendLanguage, preferences: "" };
                const res = await callJobRecommender(inputs);
                let rawOutput = res.data.outputs?.recommendation || res.data.outputs?.result || res.data.outputs?.text;
                if (!rawOutput) throw new Error('未收到数据');
                let jsonStr = rawOutput.trim();
                if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\n?/, '').replace(/\n?```$/, '');
                let parsed = JSON.parse(jsonStr);
                let data;
                if (Array.isArray(parsed)) data = { jobs: parsed };
                else if (parsed.jobs) data = { jobs: parsed.jobs };
                else data = { jobs: [] };
                currentRecommendJobs = data;
                recommendResultDiv.innerHTML = renderJobsList(data);
                const soulBtn = document.getElementById('soulMatchBtn');
                if (soulBtn) soulBtn.addEventListener('click', openSoulMatchModal);
            } catch (err) {
                console.error(err);
                recommendResultDiv.innerHTML = showError(err.message);
            }
        }

        function openSoulMatchModal() {
            if (!currentRecommendJobs || !currentRecommendJobs.jobs) {
                alert("请先点击「开始推荐」获取岗位列表");
                return;
            }
            modalPrefs = ["", "", "", "", "", ""];
            let html = "";
            for (let i = 0; i < questions.length; i++) {
                html += `<div class="mb-5">
                            <div class="font-medium text-gray-800 mb-2">${i+1}. ${questions[i]}</div>
                            <div class="flex flex-wrap gap-3" data-qidx="${i}">`;
                for (let j = 0; j < optionsList[i].length; j++) {
                    const val = optionValues[i][j];
                    html += `<label class="option-label px-4 py-2 rounded-full text-sm cursor-pointer transition" data-val="${val}">
                                <input type="radio" name="q${i}" value="${val}" class="hidden">
                                <span>${optionsList[i][j]}</span>
                            </label>`;
                }
                html += `</div></div>`;
            }
            modalQuestions.innerHTML = html;
            document.querySelectorAll('#modalQuestions .option-label').forEach(label => {
                label.addEventListener('click', (e) => {
                    const parent = label.closest('.flex.flex-wrap');
                    const qIdx = parseInt(parent.getAttribute('data-qidx'));
                    const val = label.getAttribute('data-val');
                    parent.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                    label.classList.add('selected');
                    modalPrefs[qIdx] = val;
                });
            });
            modalResultDiv.innerHTML = "";
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modalResultDiv.innerHTML = "";
        }

        async function submitPreferences() {
            if (modalPrefs.some(v => !v)) {
                modalResultDiv.innerHTML = '<div class="text-red-500 text-sm mt-2">请完成所有选择题</div>';
                return;
            }
            const prefStr = modalPrefs.join(',');
            // 在模态框中央显示 loading
            modalQuestions.innerHTML = '<div class="flex justify-center py-12"><div class="loader"></div><span class="ml-3 text-gray-500">分析中，请稍候...</span></div>';
            modalResultDiv.innerHTML = "";
            try {
                const inputs = { resume_text: resumeTextContent, language: currentRecommendLanguage, preferences: prefStr };
                const res = await callJobRecommender(inputs);
                let rawOutput = res.data.outputs?.recommendation || res.data.outputs?.result || res.data.outputs?.text;
                if (!rawOutput) throw new Error('未收到数据');
                let jsonStr = rawOutput.trim();
                if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\n?/, '').replace(/\n?```$/, '');
                let parsed = JSON.parse(jsonStr);
                let data;
                if (Array.isArray(parsed)) {
                    if (parsed.length && parsed[parsed.length-1].best_match) {
                        const jobs = parsed.slice(0, -1);
                        const best_match = parsed[parsed.length-1].best_match;
                        const best_reason = parsed[parsed.length-1].best_reason;
                        data = { jobs, best_match, best_reason };
                    } else {
                        data = { jobs: parsed };
                    }
                } else if (parsed.jobs) {
                    data = parsed;
                } else {
                    data = { jobs: [] };
                }
                currentRecommendJobs = data;
                recommendResultDiv.innerHTML = renderJobsWithBest(data);
                closeModal();
            } catch (err) {
                // 恢复问题界面
                let errHtml = "";
                for (let i = 0; i < questions.length; i++) {
                    errHtml += `<div class="mb-5">
                                <div class="font-medium text-gray-800 mb-2">${i+1}. ${questions[i]}</div>
                                <div class="flex flex-wrap gap-3" data-qidx="${i}">`;
                    for (let j = 0; j < optionsList[i].length; j++) {
                        const val = optionValues[i][j];
                        errHtml += `<label class="option-label px-4 py-2 rounded-full text-sm cursor-pointer transition" data-val="${val}">
                                    <input type="radio" name="q${i}" value="${val}" class="hidden">
                                    <span>${optionsList[i][j]}</span>
                                </label>`;
                    }
                    errHtml += `</div></div>`;
                }
                modalQuestions.innerHTML = errHtml;
                document.querySelectorAll('#modalQuestions .option-label').forEach(label => {
                    label.addEventListener('click', (e) => {
                        const parent = label.closest('.flex.flex-wrap');
                        const qIdx = parseInt(parent.getAttribute('data-qidx'));
                        const val = label.getAttribute('data-val');
                        parent.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                        label.classList.add('selected');
                        modalPrefs[qIdx] = val;
                    });
                });
                modalResultDiv.innerHTML = `<div class="text-red-500 text-sm mt-2">${err.message}</div>`;
            }
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);
        submitPreferencesBtn.addEventListener('click', submitPreferences);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // JD 分析渲染（左对齐）
        function renderTranslation(text) {
            const sections = { "岗位职责": "", "岗位要求": "", "加分项": "" };
            let current = null;
            const lines = text.split('\n');
            for (let line of lines) {
                const l = line.trim();
                if (l.includes("岗位职责")) { current = "岗位职责"; continue; }
                if (l.includes("岗位要求")) { current = "岗位要求"; continue; }
                if (l.includes("加分项")) { current = "加分项"; continue; }
                if (current && l) sections[current] += l + "<br>";
            }
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="bg-white rounded-xl p-5 shadow-sm text-left">
                            <h3 class="font-semibold text-indigo-700 flex items-center gap-2"><i class="fas fa-tasks"></i> 岗位职责</h3>
                            <div class="text-sm text-gray-600 mt-2">${sections["岗位职责"] || "无"}</div>
                        </div>
                        <div class="bg-white rounded-xl p-5 shadow-sm text-left">
                            <h3 class="font-semibold text-indigo-700 flex items-center gap-2"><i class="fas fa-clipboard-list"></i> 岗位要求</h3>
                            <div class="text-sm text-gray-600 mt-2">${sections["岗位要求"] || "无"}</div>
                        </div>
                        <div class="bg-white rounded-xl p-5 shadow-sm text-left">
                            <h3 class="font-semibold text-indigo-700 flex items-center gap-2"><i class="fas fa-star"></i> 加分项</h3>
                            <div class="text-sm text-gray-600 mt-2">${sections["加分项"] || "无"}</div>
                        </div>
                    </div>`;
        }

        // 智能匹配渲染（全部左对齐）
        function renderMatch(data) {
            const overall = data.overall_match || { score: 0, reason: '' };
            const subs = data.sub_scores || { skills: 0, experience: 0, education: 0 };
            const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
            const advice = data.application_advice || { suggestion: '', reason: '' };

            const renderList = (items) => {
                if (!items || items.length === 0) return '<div class="text-gray-400 text-sm">无</div>';
                return items.map(item => `<div class="custom-list-item text-gray-700">${item}</div>`).join('');
            };

            return `
                <div class="bg-gradient-to-br from-white to-indigo-50/30 rounded-xl p-5 mb-6 shadow-sm border border-indigo-100 text-left">
                    <div class="mb-2">
                        <span class="text-3xl font-extrabold text-indigo-600">匹配度 ${overall.score}%</span>
                    </div>
                    <div class="text-sm text-gray-500 mb-3">${overall.reason}</div>
                    <div class="flex gap-4">
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-semibold">技能 ${subs.skills}%</span>
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-semibold">经验 ${subs.experience}%</span>
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-semibold">教育 ${subs.education}%</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div class="match-card p-5"><div class="card-title-badge bg-green-100 text-green-700"><i class="fas fa-check-circle mr-1"></i> 强匹配</div>${renderList(opt.keep)}</div>
                    <div class="match-card p-5"><div class="card-title-badge bg-yellow-100 text-yellow-700"><i class="fas fa-flag mr-1"></i> 可弱化</div>${renderList(opt.weaken)}</div>
                    <div class="match-card p-5"><div class="card-title-badge bg-blue-100 text-blue-700"><i class="fas fa-drafting-compass mr-1"></i> 可深挖</div>${renderList(opt.deepen)}</div>
                    <div class="match-card p-5"><div class="card-title-badge bg-red-100 text-red-700"><i class="fas fa-times-circle mr-1"></i> 不匹配</div>${renderList(opt.not_match)}</div>
                </div>

                <div class="bg-purple-50 rounded-xl p-5 border-l-4 border-purple-500 shadow-sm text-left">
                    <div class="flex items-start gap-3">
                        <i class="fas fa-lightbulb text-purple-500 text-xl mt-0.5"></i>
                        <div>
                            <span class="font-bold text-purple-800">投递建议：</span>
                            <span class="text-purple-700 font-medium">${advice.suggestion}</span>
                            <p class="text-gray-700 text-sm mt-1">${advice.reason}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function runAnalyze() {
            const jd = jdTextArea.value.trim();
            if (!jd) { alert("请粘贴职位描述"); return; }
            if (!resumeTextContent) { alert("请先上传简历"); return; }
            analyzeResultContent.innerHTML = showLoading();
            try {
                const res = await callPIPEI({ jd_text: jd, resume_text: resumeTextContent });
                translationResult = res.data.outputs.translation;
                const analysisRaw = res.data.outputs.analysis;
                try { matchResult = JSON.parse(analysisRaw); } catch(e) { matchResult = null; }
                if (translationResult) analyzeResultContent.innerHTML = renderTranslation(translationResult);
                else analyzeResultContent.innerHTML = '<div class="text-center">翻译结果为空</div>';
            } catch (err) {
                analyzeResultContent.innerHTML = showError(err.message);
            }
        }

        let currentAnalyzeTab = 'translate';
        function switchAnalyzeTab(tab) {
            currentAnalyzeTab = tab;
            if (tab === 'translate') {
                tabTranslateResult.className = "pb-2 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabMatchResult.className = "pb-2 text-gray-500 hover:text-gray-700";
                if (translationResult) analyzeResultContent.innerHTML = renderTranslation(translationResult);
                else analyzeResultContent.innerHTML = '<div class="text-center text-gray-500">暂无JD分析结果，请先分析</div>';
            } else {
                tabMatchResult.className = "pb-2 text-indigo-600 border-b-2 border-indigo-600 font-medium";
                tabTranslateResult.className = "pb-2 text-gray-500 hover:text-gray-700";
                if (matchResult) analyzeResultContent.innerHTML = renderMatch(matchResult);
                else analyzeResultContent.innerHTML = '<div class="text-center text-gray-500">暂无智能匹配结果，请先分析</div>';
            }
        }
        tabTranslateResult.addEventListener('click', () => switchAnalyzeTab('translate'));
        tabMatchResult.addEventListener('click', () => switchAnalyzeTab('match'));

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'recommend') {
                modeRecommendBtn.className = "mode-btn mode-btn-active px-7 py-2.5 rounded-full font-medium text-base shadow-sm flex items-center gap-2";
                modeAnalyzeBtn.className = "mode-btn mode-btn-inactive px-7 py-2.5 rounded-full font-medium text-base flex items-center gap-2";
                recommendPanel.classList.remove('hidden');
                analyzePanel.classList.add('hidden');
            } else {
                modeAnalyzeBtn.className = "mode-btn mode-btn-active px-7 py-2.5 rounded-full font-medium text-base shadow-sm flex items-center gap-2";
                modeRecommendBtn.className = "mode-btn mode-btn-inactive px-7 py-2.5 rounded-full font-medium text-base flex items-center gap-2";
                analyzePanel.classList.remove('hidden');
                recommendPanel.classList.add('hidden');
            }
        }

        function init() {
            dynamicContent.appendChild(recommendPanel);
            dynamicContent.appendChild(analyzePanel);
            recommendPanel.classList.remove('hidden');
            analyzePanel.classList.add('hidden');
            startRecommendBtn.addEventListener('click', loadRecommendations);
            startAnalyzeBtn.addEventListener('click', runAnalyze);
            langSelect.addEventListener('change', (e) => { currentRecommendLanguage = e.target.value; });
            modeRecommendBtn.addEventListener('click', () => setMode('recommend'));
            modeAnalyzeBtn.addEventListener('click', () => setMode('analyze'));
        }
        init();
    </script>
</body>
</html>
