<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIPEI · 智能求职助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%); }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mode-btn-active { background-color: #4f46e5; color: white; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }
        .mode-btn-inactive { background-color: #f3f4f6; color: #4b5563; }
        .keyword-tag { display: inline-block; background: #e0e7ff; color: #3730a3; border-radius: 9999px; padding: 0.2rem 0.7rem; font-size: 0.75rem; margin: 0.2rem; }
        .best-match-highlight { border: 2px solid #f59e0b; background: #fffbeb; transition: all 0.2s; }
        .question-item { margin-bottom: 1rem; }
        .question-text { font-weight: 500; margin-bottom: 0.5rem; color: #1f2937; }
        .option-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .option-label { display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f3f4f6; padding: 0.5rem 1rem; border-radius: 2rem; transition: all 0.2s; }
        .option-label.selected { background: #4f46e5; color: white; }
        /* 智能匹配卡片样式 */
        .match-score-card { background: linear-gradient(135deg, #fff, #f8fafc); border-radius: 1rem; padding: 1.2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .match-subscore { display: inline-block; background: #eef2ff; color: #4f46e5; border-radius: 9999px; padding: 0.2rem 0.8rem; font-size: 0.8rem; font-weight: 500; }
        .card-keep { background: #f0fdf4; border-left: 4px solid #22c55e; border-radius: 0.75rem; }
        .card-weaken { background: #fefce8; border-left: 4px solid #eab308; border-radius: 0.75rem; }
        .card-deepen { background: #eff6ff; border-left: 4px solid #3b82f6; border-radius: 0.75rem; }
        .card-notmatch { background: #fef2f2; border-left: 4px solid #ef4444; border-radius: 0.75rem; }
        .advice-card { background: #f5f3ff; border-left: 4px solid #8b5cf6; border-radius: 0.75rem; }
        /* 自定义列表：只用一个点 */
        .custom-list-item { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.4rem; }
        .custom-list-item::before { content: "•"; font-weight: bold; color: currentColor; flex-shrink: 0; }
        .card-title-badge { display: inline-block; background: rgba(0,0,0,0.05); padding: 0.2rem 0.8rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-5xl">
        <!-- 头部 -->
        <div class="text-center mb-6">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PIPEI</h1>
            <p class="text-gray-600 mt-1">上传简历 · 精准求职</p>
        </div>

        <!-- 简历上传（全局） -->
        <div class="bg-white rounded-2xl shadow-lg p-5 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-3">📄 简历上传</h2>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center hover:border-indigo-300 transition mb-3">
                <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                <button id="uploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition">
                    <i class="fas fa-cloud-upload-alt mr-2"></i>选择文件 (PDF/Word)
                </button>
                <p id="fileName" class="text-sm text-gray-500 mt-2">未选择文件</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">或直接粘贴简历文本</label>
                <textarea id="resumeText" rows="4" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="将简历文本粘贴在这里..."></textarea>
            </div>
        </div>

        <!-- 模式切换 -->
        <div class="flex gap-4 mb-6 justify-center">
            <button id="modeRecommendBtn" class="mode-btn-active px-6 py-2 rounded-full font-medium transition">岗位推荐</button>
            <button id="modeAnalyzeBtn" class="mode-btn-inactive px-6 py-2 rounded-full font-medium transition">岗位分析</button>
        </div>

        <!-- 动态内容区域 -->
        <div id="dynamicContent" class="bg-white rounded-2xl shadow-xl p-6"></div>
    </div>

    <!-- 岗位推荐模式的内容 -->
    <div id="recommendPanel" class="hidden">
        <div class="mb-4 flex justify-between items-center">
            <span class="text-gray-700">🌐 输出语言：</span>
            <select id="langSelect" class="border rounded-lg px-3 py-1 text-sm">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <div class="flex justify-center mb-6">
            <button id="startRecommendBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold py-2 px-8 rounded-full shadow-lg">
                🚀 开始推荐
            </button>
        </div>
        <div id="recommendResult" class="mt-4"></div>
    </div>

    <!-- 岗位分析模式的内容 -->
    <div id="analyzePanel" class="hidden">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">💼 职位描述 (JD)</label>
            <textarea id="jdText" rows="6" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="请粘贴职位描述..."></textarea>
        </div>
        <div class="flex justify-center mb-6">
            <button id="startAnalyzeBtn" class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold py-2 px-8 rounded-full shadow-lg">
                📊 开始分析
            </button>
        </div>
        <div id="analyzeResult" class="mt-4">
            <div class="border-b border-gray-200 flex gap-4 mb-3">
                <button id="tabTranslateResult" class="py-1 px-2 text-indigo-600 border-b-2 border-indigo-600">JD分析</button>
                <button id="tabMatchResult" class="py-1 px-2 text-gray-500">智能匹配</button>
            </div>
            <div id="analyzeResultContent" class="text-gray-500 text-center py-8">点击「开始分析」查看结果</div>
        </div>
    </div>

    <!-- 灵魂匹配模态框 -->
    <div id="soulMatchModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full mx-4 p-6 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">🔮 灵魂匹配</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="modalQuestions"></div>
            <div class="flex justify-end gap-3 mt-6">
                <button id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-lg">取消</button>
                <button id="submitPreferencesBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg">分析</button>
            </div>
            <div id="modalResult" class="mt-4"></div>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let resumeTextContent = "";
        let translationResult = null;
        let matchResult = null;
        let currentMode = "recommend";
        let currentRecommendLanguage = "zh";
        let currentRecommendJobs = null;
        let userPreferences = ["", "", "", "", "", ""];
        let modalPrefs = ["", "", "", "", "", ""];

        const questions = [
            "你更喜欢的工作节奏是？",
            "在团队中你通常扮演什么角色？",
            "你更擅长处理哪类问题？",
            "你对数字的敏感度如何？",
            "你更希望工作成果是？",
            "你对未知领域的探索意愿？"
        ];
        const optionsList = [
            ["A. 快速变化，多任务并行", "B. 稳定有序，深度专注"],
            ["A. 创意提出者", "B. 执行推动者", "C. 协调沟通者"],
            ["A. 抽象的逻辑与数据", "B. 具体的人际与流程"],
            ["A. 很高，喜欢分析数据", "B. 一般，更关注业务含义"],
            ["A. 可量化的指标提升", "B. 用户或同事的认可"],
            ["A. 强烈，喜欢新工具/方法", "B. 谨慎，偏好成熟方案"]
        ];
        const optionValues = [
            ["A", "B"],
            ["A", "B", "C"],
            ["A", "B"],
            ["A", "B"],
            ["A", "B"],
            ["A", "B"]
        ];

        // DOM 元素
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');
        const resumeTextArea = document.getElementById('resumeText');
        const modeRecommendBtn = document.getElementById('modeRecommendBtn');
        const modeAnalyzeBtn = document.getElementById('modeAnalyzeBtn');
        const dynamicContent = document.getElementById('dynamicContent');
        const recommendPanel = document.getElementById('recommendPanel');
        const analyzePanel = document.getElementById('analyzePanel');
        const startRecommendBtn = document.getElementById('startRecommendBtn');
        const recommendResultDiv = document.getElementById('recommendResult');
        const langSelect = document.getElementById('langSelect');
        const jdTextArea = document.getElementById('jdText');
        const startAnalyzeBtn = document.getElementById('startAnalyzeBtn');
        const analyzeResultContent = document.getElementById('analyzeResultContent');
        const tabTranslateResult = document.getElementById('tabTranslateResult');
        const tabMatchResult = document.getElementById('tabMatchResult');
        const modal = document.getElementById('soulMatchModal');
        const modalQuestions = document.getElementById('modalQuestions');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const submitPreferencesBtn = document.getElementById('submitPreferencesBtn');
        const modalResultDiv = document.getElementById('modalResult');

        function showLoading() {
            return `<div class="flex justify-center py-8"><div class="loader"></div><span class="ml-3 text-gray-600">分析中，请稍候...</span></div>`;
        }
        function showError(msg) {
            return `<div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg">${msg}</div>`;
        }

        async function callPIPEI(inputs) {
            const response = await fetch('/api/dify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) throw new Error(`API 调用失败: ${response.status}`);
            return response.json();
        }
        async function callJobRecommender(inputs) {
            const response = await fetch('/api/job-recommender', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) throw new Error(`岗位推荐失败: ${response.status}`);
            return response.json();
        }

        function parsePDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const typedarray = new Uint8Array(e.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let fullText = "";
                        const pages = [];
                        for (let i = 1; i <= pdf.numPages; i++) pages.push(pdf.getPage(i));
                        Promise.all(pages).then(pages => {
                            let pagePromises = pages.map(page => page.getTextContent());
                            Promise.all(pagePromises).then(textContents => {
                                textContents.forEach(textContent => {
                                    textContent.items.forEach(item => { fullText += item.str + " "; });
                                });
                                resolve(fullText.trim());
                            }).catch(reject);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }
        function parseDOCX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => resolve(result.value))
                        .catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        uploadBtn.addEventListener('click', () => resumeFileInput.click());
        resumeFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            try {
                let text = "";
                if (file.type === "application/pdf") text = await parsePDF(file);
                else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") text = await parseDOCX(file);
                else { alert("不支持的文件类型"); return; }
                resumeTextContent = text;
                resumeTextArea.value = text;
            } catch (error) { console.error(error); alert("解析失败，请尝试直接粘贴文本"); }
        });
        resumeTextArea.addEventListener('input', () => { resumeTextContent = resumeTextArea.value; });

        // 渲染岗位列表（无 best_match）
        function renderJobsList(data) {
            if (!data || !data.jobs || data.jobs.length === 0) return '<div class="text-center py-8 text-gray-500">暂无推荐岗位，请检查简历内容或稍后重试。</div>';
            let html = `<div class="space-y-5">`;
            data.jobs.forEach((job, idx) => {
                html += `<div class="border rounded-xl p-4 hover:shadow-md transition">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <h3 class="text-lg font-bold text-indigo-700">${idx+1}. ${job.title}</h3>
                                <span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full text-sm">匹配度 ${job.match_score}%</span>
                            </div>
                            <p class="text-gray-600 text-sm mt-1">${job.description}</p>
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${job.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('')}
                            </div>
                        </div>`;
            });
            html += `</div>`;
            html += `<div class="mt-6 text-center"><button id="soulMatchBtn" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-medium py-2 px-6 rounded-full shadow hover:shadow-lg transition">🔮 灵魂匹配</button></div>`;
            return html;
        }

        // 渲染带 best_match 的结果
        function renderJobsWithBest(data) {
            if (!data || !data.jobs || data.jobs.length === 0) return '<div class="text-center py-8 text-gray-500">暂无推荐岗位</div>';
            let html = `<div class="space-y-5">`;
            data.jobs.forEach((job, idx) => {
                const isBest = data.best_match && data.best_match.title === job.title;
                html += `<div class="border rounded-xl p-4 ${isBest ? 'best-match-highlight' : ''} transition">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <h3 class="text-lg font-bold text-indigo-700">${idx+1}. ${job.title}</h3>
                                <span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full text-sm">匹配度 ${job.match_score}%</span>
                            </div>
                            <p class="text-gray-600 text-sm mt-1">${job.description}</p>
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${job.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('')}
                            </div>
                        </div>`;
            });
            html += `</div>`;
            if (data.best_match && data.best_reason) {
                html += `<div class="mt-5 p-4 bg-amber-50 rounded-xl border border-amber-200">
                            <div class="flex items-start gap-2">
                                <i class="fas fa-crown text-amber-500 text-xl"></i>
                                <div>
                                    <span class="font-bold text-amber-800">🔮 灵魂匹配推荐：</span>
                                    <span class="font-semibold text-amber-700">${data.best_match.title}</span>
                                    <p class="text-gray-700 text-sm mt-1">${data.best_reason}</p>
                                </div>
                            </div>
                         </div>`;
            }
            return html;
        }

        async function loadRecommendations() {
            if (!resumeTextContent) {
                recommendResultDiv.innerHTML = showError("请先上传简历");
                return;
            }
            recommendResultDiv.innerHTML = showLoading();
            try {
                const inputs = { resume_text: resumeTextContent, language: currentRecommendLanguage, preferences: "" };
                const res = await callJobRecommender(inputs);
                let rawOutput = res.data.outputs?.recommendation || res.data.outputs?.result || res.data.outputs?.text;
                if (!rawOutput) throw new Error('未收到数据');
                let jsonStr = rawOutput.trim();
                if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\n?/, '').replace(/\n?```$/, '');
                let parsed = JSON.parse(jsonStr);
                let data;
                if (Array.isArray(parsed)) data = { jobs: parsed };
                else if (parsed.jobs) data = { jobs: parsed.jobs };
                else data = { jobs: [] };
                currentRecommendJobs = data;
                recommendResultDiv.innerHTML = renderJobsList(data);
                const soulBtn = document.getElementById('soulMatchBtn');
                if (soulBtn) soulBtn.addEventListener('click', openSoulMatchModal);
            } catch (err) {
                console.error(err);
                recommendResultDiv.innerHTML = showError(err.message);
            }
        }

        function openSoulMatchModal() {
            if (!currentRecommendJobs || !currentRecommendJobs.jobs) {
                alert("请先点击「开始推荐」获取岗位列表");
                return;
            }
            modalPrefs = ["", "", "", "", "", ""];
            let html = "";
            for (let i = 0; i < questions.length; i++) {
                html += `<div class="question-item">
                            <div class="question-text">${i+1}. ${questions[i]}</div>
                            <div class="option-group" data-qidx="${i}">`;
                for (let j = 0; j < optionsList[i].length; j++) {
                    const val = optionValues[i][j];
                    html += `<label class="option-label" data-val="${val}">
                                <input type="radio" name="q${i}" value="${val}" style="display:none;">
                                <span>${optionsList[i][j]}</span>
                            </label>`;
                }
                html += `</div></div>`;
            }
            modalQuestions.innerHTML = html;
            document.querySelectorAll('#modalQuestions .option-label').forEach(label => {
                label.addEventListener('click', (e) => {
                    const parent = label.closest('.option-group');
                    const qIdx = parseInt(parent.getAttribute('data-qidx'));
                    const val = label.getAttribute('data-val');
                    parent.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                    label.classList.add('selected');
                    modalPrefs[qIdx] = val;
                });
            });
            modalResultDiv.innerHTML = "";
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modalResultDiv.innerHTML = "";
        }

        async function submitPreferences() {
            if (modalPrefs.some(v => !v)) {
                modalResultDiv.innerHTML = '<div class="text-red-500 text-sm mt-2">请完成所有选择题</div>';
                return;
            }
            const prefStr = modalPrefs.join(',');
            modalResultDiv.innerHTML = '<div class="text-center py-4"><div class="loader inline-block"></div><p class="mt-2">分析中...</p></div>';
            try {
                const inputs = { resume_text: resumeTextContent, language: currentRecommendLanguage, preferences: prefStr };
                const res = await callJobRecommender(inputs);
                let rawOutput = res.data.outputs?.recommendation || res.data.outputs?.result || res.data.outputs?.text;
                if (!rawOutput) throw new Error('未收到数据');
                let jsonStr = rawOutput.trim();
                if (jsonStr.startsWith('```json')) jsonStr = jsonStr.replace(/^```json\n?/, '').replace(/\n?```$/, '');
                else if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/^```\n?/, '').replace(/\n?```$/, '');
                let parsed = JSON.parse(jsonStr);
                let data;
                if (Array.isArray(parsed)) {
                    if (parsed.length && parsed[parsed.length-1].best_match) {
                        const jobs = parsed.slice(0, -1);
                        const best_match = parsed[parsed.length-1].best_match;
                        const best_reason = parsed[parsed.length-1].best_reason;
                        data = { jobs, best_match, best_reason };
                    } else {
                        data = { jobs: parsed };
                    }
                } else if (parsed.jobs) {
                    data = parsed;
                } else {
                    data = { jobs: [] };
                }
                currentRecommendJobs = data;
                recommendResultDiv.innerHTML = renderJobsWithBest(data);
                closeModal();
            } catch (err) {
                modalResultDiv.innerHTML = `<div class="text-red-500 text-sm mt-2">${err.message}</div>`;
            }
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);
        submitPreferencesBtn.addEventListener('click', submitPreferences);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // 美化后的智能匹配渲染函数（修复双点，卡片标题独立，列表项单点）
        function renderTranslation(text) {
            const sections = { "岗位职责": "", "岗位要求": "", "加分项": "" };
            let current = null;
            const lines = text.split('\n');
            for (let line of lines) {
                const l = line.trim();
                if (l.includes("岗位职责")) { current = "岗位职责"; continue; }
                if (l.includes("岗位要求")) { current = "岗位要求"; continue; }
                if (l.includes("加分项")) { current = "加分项"; continue; }
                if (current && l) sections[current] += l + "<br>";
            }
            const cardClass = "bg-gray-50 rounded-xl p-4";
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="${cardClass}"><h3 class="font-semibold text-indigo-700">📋 岗位职责</h3><div class="text-sm mt-1">${sections["岗位职责"] || "无"}</div></div>
                        <div class="${cardClass}"><h3 class="font-semibold text-indigo-700">📌 岗位要求</h3><div class="text-sm mt-1">${sections["岗位要求"] || "无"}</div></div>
                        <div class="${cardClass}"><h3 class="font-semibold text-indigo-700">⭐ 加分项</h3><div class="text-sm mt-1">${sections["加分项"] || "无"}</div></div>
                    </div>`;
        }

        function renderMatch(data) {
            const overall = data.overall_match || { score: 0, reason: '' };
            const subs = data.sub_scores || { skills: 0, experience: 0, education: 0 };
            const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
            const advice = data.application_advice || { suggestion: '', reason: '' };

            // 辅助：生成单个列表项（只用一个点）
            const renderList = (items) => {
                if (!items || items.length === 0) return '<div class="text-gray-400 text-sm">无</div>';
                return items.map(item => `<div class="custom-list-item text-sm">${item}</div>`).join('');
            };

            return `
                <div class="match-score-card mb-6">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <span class="text-3xl font-bold text-indigo-600">匹配度 ${overall.score}%</span>
                        <span class="text-sm text-gray-500">${overall.reason}</span>
                    </div>
                    <div class="flex gap-3 mt-3">
                        <span class="match-subscore">技能 ${subs.skills}%</span>
                        <span class="match-subscore">经验 ${subs.experience}%</span>
                        <span class="match-subscore">教育 ${subs.education}%</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div class="card-keep p-4">
                        <div class="card-title-badge bg-green-100 text-green-800">✅ 强匹配</div>
                        ${renderList(opt.keep)}
                    </div>
                    <div class="card-weaken p-4">
                        <div class="card-title-badge bg-yellow-100 text-yellow-800">⚠️ 可弱化</div>
                        ${renderList(opt.weaken)}
                    </div>
                    <div class="card-deepen p-4">
                        <div class="card-title-badge bg-blue-100 text-blue-800">🔍 可深挖</div>
                        ${renderList(opt.deepen)}
                    </div>
                    <div class="card-notmatch p-4">
                        <div class="card-title-badge bg-red-100 text-red-800">❌ 不匹配</div>
                        ${renderList(opt.not_match)}
                    </div>
                </div>

                <div class="advice-card p-4">
                    <div class="flex items-start gap-2">
                        <i class="fas fa-lightbulb text-purple-500 text-xl mt-0.5"></i>
                        <div>
                            <span class="font-bold text-purple-800">投递建议：</span>
                            <span class="text-purple-700">${advice.suggestion}</span>
                            <p class="text-gray-700 text-sm mt-1">${advice.reason}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function runAnalyze() {
            const jd = jdTextArea.value.trim();
            if (!jd) { alert("请粘贴职位描述"); return; }
            if (!resumeTextContent) { alert("请先上传简历"); return; }
            analyzeResultContent.innerHTML = showLoading();
            try {
                const res = await callPIPEI({ jd_text: jd, resume_text: resumeTextContent });
                translationResult = res.data.outputs.translation;
                const analysisRaw = res.data.outputs.analysis;
                try { matchResult = JSON.parse(analysisRaw); } catch(e) { matchResult = null; }
                if (translationResult) analyzeResultContent.innerHTML = renderTranslation(translationResult);
                else analyzeResultContent.innerHTML = '<div class="text-center">翻译结果为空</div>';
            } catch (err) {
                analyzeResultContent.innerHTML = showError(err.message);
            }
        }

        let currentAnalyzeTab = 'translate';
        function switchAnalyzeTab(tab) {
            currentAnalyzeTab = tab;
            if (tab === 'translate') {
                tabTranslateResult.className = "py-1 px-2 text-indigo-600 border-b-2 border-indigo-600";
                tabMatchResult.className = "py-1 px-2 text-gray-500";
                if (translationResult) analyzeResultContent.innerHTML = renderTranslation(translationResult);
                else analyzeResultContent.innerHTML = '<div class="text-center text-gray-500">暂无JD分析结果，请先分析</div>';
            } else {
                tabMatchResult.className = "py-1 px-2 text-indigo-600 border-b-2 border-indigo-600";
                tabTranslateResult.className = "py-1 px-2 text-gray-500";
                if (matchResult) analyzeResultContent.innerHTML = renderMatch(matchResult);
                else analyzeResultContent.innerHTML = '<div class="text-center text-gray-500">暂无智能匹配结果，请先分析</div>';
            }
        }
        tabTranslateResult.addEventListener('click', () => switchAnalyzeTab('translate'));
        tabMatchResult.addEventListener('click', () => switchAnalyzeTab('match'));

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'recommend') {
                modeRecommendBtn.className = "mode-btn-active px-6 py-2 rounded-full font-medium transition";
                modeAnalyzeBtn.className = "mode-btn-inactive px-6 py-2 rounded-full font-medium transition";
                recommendPanel.classList.remove('hidden');
                analyzePanel.classList.add('hidden');
            } else {
                modeAnalyzeBtn.className = "mode-btn-active px-6 py-2 rounded-full font-medium transition";
                modeRecommendBtn.className = "mode-btn-inactive px-6 py-2 rounded-full font-medium transition";
                analyzePanel.classList.remove('hidden');
                recommendPanel.classList.add('hidden');
            }
        }

        function init() {
            dynamicContent.appendChild(recommendPanel);
            dynamicContent.appendChild(analyzePanel);
            recommendPanel.classList.remove('hidden');
            analyzePanel.classList.add('hidden');
            startRecommendBtn.addEventListener('click', loadRecommendations);
            startAnalyzeBtn.addEventListener('click', runAnalyze);
            langSelect.addEventListener('change', (e) => { currentRecommendLanguage = e.target.value; });
            modeRecommendBtn.addEventListener('click', () => setMode('recommend'));
            modeAnalyzeBtn.addEventListener('click', () => setMode('analyze'));
        }
        init();
    </script>
</body>
</html>
