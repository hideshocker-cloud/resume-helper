<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIPEI 求职助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Word 解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .tab-active {
            border-bottom-width: 2px;
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .tab-inactive {
            border-bottom-width: 2px;
            border-color: transparent;
            color: #6b7280;
        }
        .tab-inactive:hover {
            color: #374151;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-6xl">
        <!-- 头部 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-800">PIPEI 求职助手</h1>
            <p class="text-gray-600 mt-2">上传简历，粘贴JD，一键获取翻译与智能匹配</p>
        </div>

        <!-- 左右两栏 -->
        <div class="flex flex-col md:flex-row gap-8">
            <!-- 左侧：简历上传 -->
            <div class="md:w-1/2 bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">📄 简历上传</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
                    <input type="file" id="resumeFile" accept=".pdf,.docx" class="hidden" />
                    <button id="uploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition">
                        选择文件 (PDF/Word)
                    </button>
                    <p id="fileName" class="text-sm text-gray-500 mt-2">未选择文件</p>
                </div>
                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">或直接粘贴简历文本</label>
                    <textarea id="resumeText" rows="6" class="w-full border border-gray-300 rounded-lg p-2" placeholder="将简历文本粘贴在这里..."></textarea>
                </div>
            </div>

            <!-- 右侧：JD输入 + 开始分析按钮 -->
            <div class="md:w-1/2 bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">💼 职位描述 (JD)</h2>
                <textarea id="jdText" rows="8" class="w-full border border-gray-300 rounded-lg p-2" placeholder="请粘贴职位描述..."></textarea>
                <div class="mt-4">
                    <button id="analyzeBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition">
                        开始分析
                    </button>
                </div>
            </div>
        </div>

        <!-- 结果展示区（带选项卡） -->
        <div class="mt-8 bg-white rounded-xl shadow-lg p-6">
            <div class="border-b border-gray-200">
                <nav class="flex gap-4">
                    <button id="tabTranslate" class="py-2 px-4 text-blue-600 border-b-2 border-blue-600 font-medium">翻译结果</button>
                    <button id="tabMatch" class="py-2 px-4 text-gray-500 hover:text-gray-700">智能匹配</button>
                </nav>
            </div>
            <div id="resultContainer" class="mt-4">
                <div class="text-gray-400 text-center py-8">点击「开始分析」按钮，结果将显示在这里</div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const resumeFileInput = document.getElementById('resumeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileName');
        const resumeTextArea = document.getElementById('resumeText');
        const jdTextArea = document.getElementById('jdText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const tabTranslateBtn = document.getElementById('tabTranslate');
        const tabMatchBtn = document.getElementById('tabMatch');
        const resultContainer = document.getElementById('resultContainer');

        // 状态变量
        let resumeTextContent = "";
        let translationResult = "";
        let matchResult = null;
        let currentTab = "translate";

        function showLoading() {
            resultContainer.innerHTML = `<div class="flex justify-center py-8"><div class="loader"></div><span class="ml-2 text-gray-600">分析中，请稍候...</span></div>`;
        }

        function showError(message) {
            resultContainer.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg">${message}</div>`;
        }

        async function callDifyAPI(inputs) {
            const response = await fetch('/api/dify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs })
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API 调用失败: ${response.status} ${text}`);
            }
            const data = await response.json();
            return data;
        }

        function parsePDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const typedarray = new Uint8Array(e.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let fullText = "";
                        const pages = [];
                        for (let i = 1; i <= pdf.numPages; i++) {
                            pages.push(pdf.getPage(i));
                        }
                        Promise.all(pages).then(pages => {
                            let pagePromises = pages.map(page => page.getTextContent());
                            Promise.all(pagePromises).then(textContents => {
                                textContents.forEach(textContent => {
                                    textContent.items.forEach(item => {
                                        fullText += item.str + " ";
                                    });
                                });
                                resolve(fullText.trim());
                            }).catch(reject);
                        }).catch(reject);
                    }).catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function parseDOCX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => resolve(result.value))
                        .catch(reject);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        uploadBtn.addEventListener('click', () => resumeFileInput.click());
        resumeFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.textContent = file.name;
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    text = await parsePDF(file);
                } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                    text = await parseDOCX(file);
                } else {
                    alert("不支持的文件类型，请上传 PDF 或 Word 文档");
                    return;
                }
                resumeTextContent = text;
                resumeTextArea.value = text;
            } catch (error) {
                console.error(error);
                alert("文件解析失败，请尝试直接粘贴文本");
            }
        });

        resumeTextArea.addEventListener('input', () => {
            resumeTextContent = resumeTextArea.value;
        });

        function renderTranslation(text) {
            return `<div class="prose max-w-none"><div class="bg-gray-50 p-4 rounded-lg whitespace-pre-wrap">${text.replace(/\n/g, '<br>')}</div></div>`;
        }

        // 新渲染函数：融合优势与劣势
        function renderMatchResult(data) {
            const overall = data.overall_match || { score: 0, reason: '' };
            const subs = data.sub_scores || { skills: 0, experience: 0, education: 0 };
            const abilities = data.abilities || { have: [], missing: [] };
            const opt = data.optimization || { keep: [], weaken: [], deepen: [], not_match: [] };
            const advice = data.application_advice || { suggestion: '', reason: '' };

            // 优势：已具备能力 + 强匹配
            const haveSkills = abilities.have.map(h => `<li>${h.name} (${h.level})</li>`).join('');
            const keepItems = opt.keep.map(k => `<li>${k}</li>`).join('');
            const advantageHtml = `
                <div class="border rounded-lg p-4 bg-green-50 border-green-200">
                    <h3 class="font-semibold text-green-800 mb-2">✅ 你的优势</h3>
                    ${haveSkills ? `<div><span class="font-medium">技能优势：</span><ul class="list-disc list-inside mt-1">${haveSkills}</ul></div>` : ''}
                    ${keepItems ? `<div class="mt-3"><span class="font-medium">经历优势：</span><ul class="list-disc list-inside mt-1">${keepItems}</ul></div>` : ''}
                    ${!haveSkills && !keepItems ? '<div>暂无明确优势项</div>' : ''}
                </div>
            `;

            // 劣势：缺失能力 + 不匹配
            const missingSkills = abilities.missing.map(m => `<li>${m}</li>`).join('');
            const notMatchItems = opt.not_match.map(n => `<li>${n}</li>`).join('');
            const disadvantageHtml = `
                <div class="border rounded-lg p-4 bg-red-50 border-red-200">
                    <h3 class="font-semibold text-red-800 mb-2">⚠️ 需要提升的方面</h3>
                    ${missingSkills ? `<div><span class="font-medium">技能缺口：</span><ul class="list-disc list-inside mt-1">${missingSkills}</ul></div>` : ''}
                    ${notMatchItems ? `<div class="mt-3"><span class="font-medium">经验/能力缺失：</span><ul class="list-disc list-inside mt-1">${notMatchItems}</ul></div>` : ''}
                    ${!missingSkills && !notMatchItems ? '<div>暂无明显短板</div>' : ''}
                </div>
            `;

            // 优化建议：可弱化 + 可深挖
            const weakenItems = opt.weaken.map(w => `<li>${w}</li>`).join('');
            const deepenItems = opt.deepen.map(d => `<li>${d}</li>`).join('');
            const optimizationHtml = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="border rounded-lg p-4 bg-yellow-50 border-yellow-200">
                        <h3 class="font-semibold text-yellow-800">✂️ 可弱化</h3>
                        <ul class="list-disc list-inside mt-2">${weakenItems || '<li>无</li>'}</ul>
                    </div>
                    <div class="border rounded-lg p-4 bg-blue-50 border-blue-200">
                        <h3 class="font-semibold text-blue-800">🔍 可深挖</h3>
                        <ul class="list-disc list-inside mt-2">${deepenItems || '<li>无</li>'}</ul>
                    </div>
                </div>
            `;

            let html = `
                <div class="mb-6">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <span class="text-2xl font-bold text-indigo-600">匹配度 ${overall.score}%</span>
                        <span class="text-gray-500 text-sm">${overall.reason}</span>
                    </div>
                    <div class="mt-2 flex flex-wrap gap-4 text-sm">
                        <span>技能匹配: ${subs.skills}%</span>
                        <span>经验匹配: ${subs.experience}%</span>
                        <span>教育匹配: ${subs.education}%</span>
                    </div>
                </div>
                ${advantageHtml}
                ${disadvantageHtml}
                ${optimizationHtml}
                <div class="mt-4 p-3 bg-gray-100 rounded-lg">
                    <span class="font-semibold">📌 投递建议：</span> ${advice.suggestion} — ${advice.reason}
                </div>
            `;
            return html;
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'translate') {
                tabTranslateBtn.className = "py-2 px-4 text-blue-600 border-b-2 border-blue-600 font-medium";
                tabMatchBtn.className = "py-2 px-4 text-gray-500 hover:text-gray-700";
                if (translationResult) {
                    resultContainer.innerHTML = renderTranslation(translationResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-8">暂无翻译结果，请点击「开始分析」</div>';
                }
            } else {
                tabMatchBtn.className = "py-2 px-4 text-blue-600 border-b-2 border-blue-600 font-medium";
                tabTranslateBtn.className = "py-2 px-4 text-gray-500 hover:text-gray-700";
                if (matchResult) {
                    resultContainer.innerHTML = renderMatchResult(matchResult);
                } else {
                    resultContainer.innerHTML = '<div class="text-gray-400 text-center py-8">暂无匹配结果，请点击「开始分析」</div>';
                }
            }
        }

        tabTranslateBtn.addEventListener('click', () => switchTab('translate'));
        tabMatchBtn.addEventListener('click', () => switchTab('match'));

        analyzeBtn.addEventListener('click', async () => {
            const jd = jdTextArea.value.trim();
            if (!jd) {
                showError("请粘贴职位描述");
                return;
            }
            if (!resumeTextContent) {
                showError("请先上传简历或粘贴简历文本");
                return;
            }

            showLoading();
            try {
                const result = await callDifyAPI({
                    jd_text: jd,
                    resume_text: resumeTextContent
                });
                translationResult = result.data.outputs.translation;
                const analysisRaw = result.data.outputs.analysis;
                try {
                    matchResult = JSON.parse(analysisRaw);
                } catch (e) {
                    console.warn("匹配结果不是 JSON，原样显示");
                    matchResult = null;
                    resultContainer.innerHTML = `<div class="bg-yellow-50 p-4 rounded-lg">匹配结果格式异常，原始内容：<pre>${analysisRaw}</pre></div>`;
                    return;
                }
                switchTab('translate');
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
